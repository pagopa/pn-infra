AWSTemplateFormatVersion: 2010-09-09
Description: >
  Warning notification stack. Owns the central warning SNS topic, selects one
  Slack channel and renders custom notifications. A warning without a matching
  rule is retried and eventually moved to the dispatcher DLQ.

Parameters:
  ProjectName:
    Type: String
    Description: Project prefix used in physical resource names.

  TemplateBucketBaseUrl:
    Type: String
    Description: URL used to load infrastructure template fragments.

  LambdasBucketName:
    Type: String
    Description: S3 bucket name containing Lambda deployment packages.

  LambdasBasePath:
    Type: String
    Description: S3 key prefix for Lambda deployment packages.
    Default: ''

  EnvironmentType:
    Type: String
    Description: Deployment environment.
    AllowedValues: [dev, test, uat, hotfix, prod]

  WarningSNSTopicName:
    Type: String
    Description: Name of the central warning SNS topic.
    Default: 'pn-WarningSnsTopic'

  ConfidentialInfoAccountId:
    Type: String
    Description: AWS account ID allowed to publish warnings from the confidential-info account.
    Default: '-'

  SlackBotTokenSecretName:
    Type: String
    Description: Secrets Manager secret containing the Slack bot token, either as plain text or in a token JSON property.
    Default: '/warning-notifications/slack-bot-token'
    MinLength: 1

  Routes:
    Type: String
    Description: Semicolon-separated notification routes in type,match,channel format.
    AllowedPattern: '^(alarm|report),[A-Za-z0-9][A-Za-z0-9_-]*,C[A-Z0-9]+(;(alarm|report),[A-Za-z0-9][A-Za-z0-9_-]*,C[A-Z0-9]+)*$'

  QueueName:
    Type: String
    Description: Base name for the notification dispatcher resources.
    Default: 'Warning-Notification-Dispatcher'

  LogRetention:
    Type: Number
    Description: CloudWatch Logs retention in days.
    Default: 14

  DelaySeconds:
    Type: Number
    Default: '0'

  MessageRetentionPeriod:
    Type: Number
    Default: '600'

  MaxReceiveCount:
    Type: Number
    Default: '5'

  DeadLetterMessageRetentionPeriod:
    Type: Number
    Default: '1209600'

  VisibilityTimeout:
    Type: Number
    Default: '180'

  MaxCsvAttachmentBytes:
    Type: Number
    Description: Maximum CSV attachment size downloaded and uploaded to Slack.
    Default: '5242880'

Conditions:
  HasConfidentialInfoAccountId: !And
    - !Not [ !Equals [ !Ref ConfidentialInfoAccountId, '-' ] ]
    - !Not [ !Equals [ !Ref ConfidentialInfoAccountId, '' ] ]

Resources:

  # --- Central ingress topic -------------------------------------------------
  WarningSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref WarningSNSTopicName

  CanPublishWarningSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAwsServicesToPublishWarnings
            Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
                - cloudwatch.amazonaws.com
            Action: sns:Publish
            Resource: !Ref WarningSNSTopic
          - !If
            - HasConfidentialInfoAccountId
            - Sid: AllowPublishFromPnConfinfoAccount
              Effect: Allow
              Principal:
                AWS: !Sub 'arn:${AWS::Partition}:iam::${ConfidentialInfoAccountId}:root'
              Action: sns:Publish
              Resource: !Ref WarningSNSTopic
            - !Ref AWS::NoValue
      Topics:
        - !Ref WarningSNSTopic

  # --- Buffer queue + DLQ -----------------------------------------------------
  WarningDispatcherQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-${QueueName}'
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt WarningDispatcherDLQ.Arn
        maxReceiveCount: !Ref MaxReceiveCount
      DelaySeconds: !Ref DelaySeconds
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      ReceiveMessageWaitTimeSeconds: 15
      VisibilityTimeout: !Ref VisibilityTimeout

  WarningDispatcherDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-${QueueName}-DLQ'
      MessageRetentionPeriod: !Ref DeadLetterMessageRetentionPeriod

  WarningDispatcherDLQHasMessagesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${QueueName}-DLQ-HasMessage'
      AlarmDescription: Warning notification dispatcher messages moved to the DLQ.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt WarningDispatcherDLQ.QueueName
      Statistic: Sum
      Period: 60
      Threshold: 1
      TreatMissingData: notBreaching
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Ref WarningSNSTopic
      OKActions:
        - !Ref WarningSNSTopic

  WarningDispatcherQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref WarningDispatcherQueue
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: AllowSnsToSendMessage
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: SQS:SendMessage
            Resource: !GetAtt WarningDispatcherQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref WarningSNSTopic

  WarningTopicSubscription:
    Type: AWS::SNS::Subscription
    DependsOn: WarningDispatcherQueuePolicy
    Properties:
      Endpoint: !GetAtt WarningDispatcherQueue.Arn
      Protocol: sqs
      TopicArn: !Ref WarningSNSTopic

  WarningDispatcherEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    DependsOn: WarningNotificationDispatcherPolicy
    Properties:
      Enabled: true
      BatchSize: 1
      EventSourceArn: !GetAtt WarningDispatcherQueue.Arn
      FunctionName: !GetAtt WarningNotificationDispatcherLambda.Arn

  WarningNotificationDispatcherLogGroup:
    Type: AWS::CloudFormation::Stack
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TemplateURL: !Sub '${TemplateBucketBaseUrl}/fragments/log-group.yaml'
      Parameters:
        LogGroupName: !Sub '${ProjectName}-${QueueName}-lambda-${EnvironmentType}'
        LogGroupRetention: !Ref LogRetention
        LogGroupPrefix: '/aws/lambda'

  # --- Notification dispatcher lambda ----------------------------------------
  WarningNotificationDispatcherLambda:
    Type: AWS::Lambda::Function
    Properties:
      Description: Routes every warning message to one dedicated destination.
      FunctionName: !Sub '${ProjectName}-${QueueName}-lambda-${EnvironmentType}'
      Handler: index.lambda_handler
      Runtime: python3.14
      Timeout: 30
      Role: !GetAtt WarningNotificationDispatcherRole.Arn
      LoggingConfig:
        LogGroup: !GetAtt WarningNotificationDispatcherLogGroup.Outputs.LogGroupName
      Environment:
        Variables:
          ROUTES: !Ref Routes
          SLACK_BOT_TOKEN_SECRET_NAME: !Ref SlackBotTokenSecretName
          MAX_CSV_ATTACHMENT_BYTES: !Ref MaxCsvAttachmentBytes
      Code:
        S3Bucket: !Ref LambdasBucketName
        S3Key: !Sub ${LambdasBasePath}/warning-notification-dispatcher.zip

  WarningNotificationDispatcherAlarms:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBucketBaseUrl}/fragments/lambda-alarms.yaml'
      Parameters:
        FunctionName: !Ref WarningNotificationDispatcherLambda
        AlarmSNSTopicArn: !Ref WarningSNSTopic

  WarningNotificationDispatcherRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${QueueName}-Role'
      Path: /
      Description: Execution role for the warning notification dispatcher lambda.
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  WarningNotificationDispatcherPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${ProjectName}-${QueueName}-Policy'
      Roles:
        - !Ref WarningNotificationDispatcherRole
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: ReadSlackBotToken
            Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SlackBotTokenSecretName}*'
          - Sid: AllowSQSAccess
            Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:ChangeMessageVisibility
            Resource: !GetAtt WarningDispatcherQueue.Arn

Outputs:
  WarningSNSTopicArn:
    Description: ARN of the central warning topic.
    Value: !Ref WarningSNSTopic

  WarningSNSTopicName:
    Description: Name of the central warning topic.
    Value: !GetAtt WarningSNSTopic.TopicName

  WarningNotificationDispatcherLambdaArn:
    Description: ARN of the warning notification dispatcher lambda.
    Value: !GetAtt WarningNotificationDispatcherLambda.Arn
