AWSTemplateFormatVersion: 2010-09-09
Description: >
  Standalone warning router. Subscribes to the EXISTING alarm SNS topic and, via a
  config-driven routing table, DEVIATES matching alarms to dedicated Slack channels
  preserving the original alarm payload. Non-matching alarms are ignored. Does NOT
  touch the existing alarm enrichment lambda.

Parameters:
  TemplateBucketBaseUrl:
    Type: String
    Description: 'The S3 bucket from which to fetch the templates used by this stack.'

  AlarmSNSTopicName:
    Type: String
    Description: Name of the EXISTING alarm SNS topic the router subscribes to.
    Default: 'pn-AllAlarmSnsTopic'

  SlackInfoSimulatore:
    Type: String
    Description: '<slack workspace id>:<slack channel id> for the simulatore-recapiti warning channel.'

  RoutingRulesJson:
    Type: String
    Description: JSON array of routing rules applied by the router lambda. Only deviation rules; if none matches the message is skipped.
    Default: '[{"name":"simulatore-recapiti","match":{"alarmNamePrefix":"pn-simulatore-recapiti-"},"slackTopicArnEnv":"SLACK_TOPIC_SIMULATORE"}]'

  QueueName:
    Type: String
    Description: Base name for the router SQS queue and lambda.
    Default: 'Warning-Router'

  SlackTopicBaseName:
    Type: String
    Description: Base name for the SNS topics forwarded to Slack via Chatbot.
    Default: 'pn-warning-bot-sns'

  CreateChatbotConnection:
    Type: String
    Description: If 'true' create the AWS Chatbot Slack connection; if 'false' the destination topic is created without subscription (subscribe manually, e.g. email).
    AllowedValues: ['true', 'false']
    Default: 'true'

  DelaySeconds:
    Type: Number
    Default: '0'

  MessageRetentionPeriod:
    Type: Number
    Default: '600'

  MaxReceiveCount:
    Type: Number
    Default: '5'

  DeadLetterMessageRetentionPeriod:
    Type: Number
    Default: '1209600'

  VisibilityTimeout:
    Type: Number
    Default: '15'

Conditions:
  HasChatbotConnection: !Equals [ !Ref CreateChatbotConnection, 'true' ]

Resources:

  # --- Buffer queue + DLQ -----------------------------------------------------
  WarningRouterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt WarningRouterDLQ.Arn
        maxReceiveCount: !Ref MaxReceiveCount
      DelaySeconds: !Ref DelaySeconds
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      ReceiveMessageWaitTimeSeconds: 15
      VisibilityTimeout: !Ref VisibilityTimeout

  WarningRouterDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${QueueName}-DLQ"
      MessageRetentionPeriod: !Ref DeadLetterMessageRetentionPeriod

  WarningRouterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref WarningRouterQueue
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: AllowSnsToSendMessage
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: SQS:SendMessage
            Resource: !GetAtt WarningRouterQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:${AlarmSNSTopicName}'

  WarningSNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !GetAtt WarningRouterQueue.Arn
      Protocol: sqs
      TopicArn: !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:${AlarmSNSTopicName}'

  EventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      Enabled: true
      BatchSize: 1
      EventSourceArn: !GetAtt WarningRouterQueue.Arn
      FunctionName: !GetAtt WarningRouterLambda.Arn

  # --- Slack destination topics: ONLY deviation channels (one per deviated flow) ---
  # Non-deviated alarms keep flowing through the existing enrichment stack.
  SlackTopicSimulatore:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${SlackTopicBaseName}-simulatore'

  # Chatbot subscription created only when CreateChatbotConnection=true.
  # In DEV it is disabled: subscribe the topic manually (e.g. an email) from the console.
  SlackTopicSimulatoreChatbotSubscription:
    Condition: HasChatbotConnection
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SlackTopicSimulatore
      Endpoint: 'https://global.sns-api.chatbot.amazonaws.com'
      Protocol: https

  SlackTopicsPublishPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SlackTopicSimulatore
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaPublish
            Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sns:Publish
            Resource:
              - !Ref SlackTopicSimulatore

  SimulatoreSlackChannelConnection:
    Condition: HasChatbotConnection
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/sns-topic-to-slack-channel.yaml"
      Parameters:
        SNSTopicArn: !Ref SlackTopicSimulatore
        SlackInfo: !Ref SlackInfoSimulatore
        TopicName: 'warning-simulatore'

  # --- Router lambda ----------------------------------------------------------
  WarningRouterLambda:
    Type: AWS::Lambda::Function
    Properties:
      Description: Routes matching warning messages to dedicated Slack channels.
      FunctionName: !Sub '${QueueName}-router-lambda'
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: 15
      Role: !GetAtt WarningRouterLambdaRole.Arn
      Environment:
        Variables:
          SLACK_TOPIC_SIMULATORE: !Ref SlackTopicSimulatore
          ROUTING_RULES: !Ref RoutingRulesJson
      Code:
        ZipFile: |
          import json
          import os
          import re
          import traceback
          import boto3

          SNS = boto3.client('sns')

          def lambda_handler(event, context):
              if not event or 'Records' not in event:
                  print('Empty event')
                  return {'statusCode': 500, 'body': 'empty event'}
              processed = 0
              for record in event['Records']:
                  try:
                      handle_record(record)
                      processed += 1
                  except Exception:
                      traceback.print_exc()
              return {'statusCode': 200, 'body': json.dumps({'processed': processed})}

          def handle_record(record):
              body = json.loads(record['body'])
              message = json.loads(body['Message'])
              print('########### INPUT MESSAGE #############')
              print(message)

              rules = parse_routing_rules(os.environ.get('ROUTING_RULES', '[]'))
              rule = select_rule(rules, message)
              if rule is None:
                  print('No routing rule matched; nothing to deviate. Skipping.')
                  return
              topic_arn = resolve_topic_arn(rule)
              if not topic_arn:
                  print('Rule "%s" matched but destination topic env "%s" is not set. Skipping.' % (rule.get('name'), rule.get('slackTopicArnEnv')))
                  return
              print('Matched rule: %s' % rule.get('name', 'default'))

              print('########### OUTPUT MESSAGE #############')
              print(message)
              SNS.publish(
                  TopicArn=topic_arn,
                  Message=json.dumps(message),
                  MessageStructure='string',
              )

          def parse_routing_rules(rules_json):
              try:
                  rules = json.loads(rules_json)
                  if isinstance(rules, list):
                      return rules
              except Exception:
                  traceback.print_exc()
              return []

          def select_rule(rules, message):
              for rule in rules:
                  if rule_matches(rule.get('match', {}), message):
                      return rule
              return None

          def rule_matches(match, message):
              alarm_name = extract_alarm_name(message)
              source = message.get('source')
              namespace = extract_namespace(message)
              serialized = json.dumps(message)

              prefix = match.get('alarmNamePrefix')
              if prefix and (alarm_name is None or not alarm_name.startswith(prefix)):
                  return False
              alarm_regex = match.get('alarmNameRegex')
              if alarm_regex and (alarm_name is None or re.search(alarm_regex, alarm_name) is None):
                  return False
              expected_source = match.get('source')
              if expected_source and source != expected_source:
                  return False
              expected_namespace = match.get('namespace')
              if expected_namespace and namespace != expected_namespace:
                  return False
              message_regex = match.get('messageRegex')
              if message_regex and re.search(message_regex, serialized) is None:
                  return False
              return True

          def resolve_topic_arn(rule):
              env_key = rule.get('slackTopicArnEnv', '')
              return os.environ.get(env_key)

          def extract_alarm_name(message):
              return message.get('AlarmName') or message.get('alarmName')

          def extract_namespace(message):
              trigger = message.get('Trigger') or message.get('trigger') or {}
              return trigger.get('Namespace') or trigger.get('namespace')

  WarningRouterLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${QueueName}-Role'
      Path: /
      Description: Execution role for the warning router lambda.
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaSQSQueueExecutionRole

  WarningRouterLambdaPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${QueueName}-Policy'
      Roles:
        - !Ref WarningRouterLambdaRole
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: PublishToSlackTopics
            Effect: Allow
            Action: sns:Publish
            Resource:
              - !Ref SlackTopicSimulatore
          - Sid: AllowSQSAccess
            Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:ChangeMessageVisibility
            Resource: !GetAtt WarningRouterQueue.Arn

Outputs:
  WarningRouterLambdaArn:
    Description: ARN of the warning router lambda.
    Value: !GetAtt WarningRouterLambda.Arn
