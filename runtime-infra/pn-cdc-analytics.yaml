AWSTemplateFormatVersion: '2010-09-09'
Description: Create base resources for CDC files analysis and daily count reporting for Data Lake

Parameters:
  ProjectName:
    Type: String
    Default: pn
    Description: Base name for pn project
  LogsBucketName:
    Type: String
    Description: Logs bucket name
  BucketSuffix:
    Type: String
    Description: Suffix for the athena result bucket name
  LogsBucketKmsKeyArn:
    Type: String
    Description: Arn of logs bucket KMS key
  TemplateBucketBaseUrl:
    Type: String
    Description: The S3 bucket from which to fetch the templates used by this stack
  AlarmSNSTopicArn:
    Type: String
    Description: ARN of the SNS topic for alarms
  LambdasBucketName:
    Type: String
    Description: S3 bucket name containing Lambda deployment packages
  LambdasBasePath:
    Type: String
    Description: S3 key prefix for Lambda deployment packages
  DataLakeCountGitConfigUrl:
    Type: String
    Default: ''
    Description: >
      Git raw content URL with embedded commit SHA or tag.
      Examples: https://raw.githubusercontent.com/pagopa/pn-infra/1234567890abcdef1234567890abcdef12345678/runtime-infra/datalake/ingestion-count-queries.json
      or https://raw.githubusercontent.com/pagopa/pn-infra/v1.0.0/runtime-infra/datalake/ingestion-count-queries.json
  DataLakeCountExportScheduleCron:
    Type: String
    Default: 'cron(0 1 * * ? *)'
    Description: Schedule expression for Data Lake count export. Default runs daily at 01:00 UTC
  AthenaReportingAlertsConfigGitUrl:
    Type: String
    Default: ''
    Description: >
      Git raw content URL with embedded commit SHA for Athena reporting and alerts config JSON.
      Example: https://raw.githubusercontent.com/pagopa/pn-infra/abc123def456.../runtime-infra/athena/reporting-alerts-config.json
  AthenaReportingAlertsSlackEmail:
    Type: String
    Default: ''
    Description: 'Slack channel email address for Athena reporting and alerts notifications. Format: channel-name@workspace.slack.com'
  AthenaReportingAlertsSchedulerRate:
    Type: String
    Default: 'rate(1 minute)'
    Description: Schedule rate for Reporting Alerts Scheduler reconciliation loop. Default is 1 minute.

Resources:
  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                  - s3:GetObject
                Resource:
                  - !Sub arn:aws:s3:::${LogsBucketName}
                  - !Sub arn:aws:s3:::${LogsBucketName}/*
        - PolicyName: S3EncryptionAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetEncryptionConfiguration
                Resource:
                  - !Sub arn:aws:s3:::${LogsBucketName}
        - PolicyName: KMSEncryptionAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource:
                  - !Ref LogsBucketKmsKeyArn

  AthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    DependsOn: GlueServiceRole
    Properties:
      Name: cdc_analytics_workgroup
      Description: Workgroup for querying data in Athena
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        ResultConfiguration:
          OutputLocation: !Sub s3://${AthenaResultsBucket}/
          EncryptionConfiguration:
            EncryptionOption: SSE_S3

  GlueDatabase:
    Type: AWS::Glue::Database
    DependsOn: AthenaWorkGroup
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: cdc_analytics_database

  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${ProjectName}-cdc-analytics-athena-results-${AWS::Region}-${AWS::AccountId}-${BucketSuffix}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AthenaResultsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AthenaResultsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: athena.amazonaws.com
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource:
              - !Sub arn:aws:s3:::${AthenaResultsBucket}/*
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - Effect: Allow
            Principal:
              Service: athena.amazonaws.com
            Action:
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::${AthenaResultsBucket}
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  EventBusRunLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
                - scheduler.amazonaws.com
      Policies:
        - PolicyName: runLambda
          PolicyDocument:
            Statement:
              - Sid: invokeLambda
                Action:
                  - "lambda:InvokeFunction"
                Effect: Allow
                Resource:
                  - !GetAtt DataLakeCountExport.Arn

  AsseverationGlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDatabase
      TableInput:
        Name: pn_asseveration
        TableType: EXTERNAL_TABLE
        Parameters:
          EXTERNAL: 'true'
          projection.enabled: 'true'
          projection.p_year.type: integer
          projection.p_year.range: 2024,2099
          projection.p_month.type: integer
          projection.p_month.range: 01,12
          projection.p_month.digits: '2'
          projection.p_day.type: integer
          projection.p_day.range: 01,31
          projection.p_day.digits: '2'
          projection.p_hour.type: integer
          projection.p_hour.range: 00,23
          projection.p_hour.digits: '2'
          storage.location.template: !Join
            - ''
            - - s3://
              - !Ref LogsBucketName
              - /flussi/pad26_asseverazione/${p_year}/${p_month}/${p_day}/${p_hour}/
        StorageDescriptor:
          Location: !Sub s3://${LogsBucketName}/flussi/pad26_asseverazione/
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
          Columns:
            - Name: iun
              Type: string
            - Name: senderPaId
              Type: string
            - Name: notificationSentAt
              Type: string
            - Name: noticeCode
              Type: string
            - Name: creditorTaxId
              Type: string
            - Name: debtorPosUpdateDate
              Type: string
            - Name: recordCreationDate
              Type: string
            - Name: recipientIdx
              Type: int
            - Name: version
              Type: int
            - Name: moreFields
              Type: string
        PartitionKeys:
          - Name: p_year
            Type: string
          - Name: p_month
            Type: string
          - Name: p_day
            Type: string
          - Name: p_hour
            Type: string

  DataLakeCountExportRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub pn-DataLakeCountExportLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CdcDailyCountLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: GlueCatalogAccess
                Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetDatabase
                Resource:
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${GlueDatabase}
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${GlueDatabase}/*
              - Sid: AthenaQueryExecution
                Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                Resource: !Sub arn:aws:athena:${AWS::Region}:${AWS::AccountId}:workgroup/${AthenaWorkGroup}
              - Sid: AthenaResultsBucketAccess
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${AthenaResultsBucket}
                  - !Sub arn:aws:s3:::${AthenaResultsBucket}/*
              - Sid: LogsBucketReadAccess
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${LogsBucketName}
                  - !Sub arn:aws:s3:::${LogsBucketName}/*
              - Sid: LogsBucketCountWriteAccess
                Effect: Allow
                Action: s3:PutObject
                Resource: !Sub arn:aws:s3:::${LogsBucketName}/datalake_counts/*
              - Sid: KMSKeyAccess
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !Ref LogsBucketKmsKeyArn
  
  DataLakeCountExportLogGroup:
    Type: AWS::CloudFormation::Stack
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TemplateURL: !Sub ${TemplateBucketBaseUrl}/fragments/log-group.yaml
      Parameters:
        LogGroupName: !Sub "${ProjectName}-DataLakeCountExport"
        LogGroupRetention: 14
        LogGroupPrefix: /aws/lambda

  DataLakeCountExport:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-DataLakeCountExport"
      Description: Exports daily counts from Athena tables for Data Lake reconciliation
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 256
      Timeout: 900
      Role: !GetAtt DataLakeCountExportRole.Arn
      Environment:
        Variables:
          CONFIG_GIT_URL: !Ref DataLakeCountGitConfigUrl
          OUTPUT_S3_BUCKET: !Ref LogsBucketName
          ATHENA_RESULTS_BUCKET: !Ref AthenaResultsBucket
          ATHENA_DATABASE: !Ref GlueDatabase
          ATHENA_WORKGROUP: !Ref AthenaWorkGroup
          MAX_WORKERS: "15"
      Code:
        S3Bucket: !Ref LambdasBucketName
        S3Key: !Sub ${LambdasBasePath}/datalake-count-export.zip
      LoggingConfig:
        LogGroup: !GetAtt DataLakeCountExportLogGroup.Outputs.LogGroupName

  DataLakeCountExportSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Description: Triggers Data Lake count export based on configured schedule
      ScheduleExpression: !Ref DataLakeCountExportScheduleCron
      FlexibleTimeWindow:
        Mode: "OFF"
      State: "ENABLED"
      Target:
        Arn: !GetAtt DataLakeCountExport.Arn
        RoleArn: !GetAtt EventBusRunLambdaRole.Arn

  DataLakeCountExportInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt DataLakeCountExport.Arn
      Principal: scheduler.amazonaws.com
      SourceArn: !GetAtt DataLakeCountExportSchedule.Arn

  ###############################################################################
  ###                ATHENA REPORTING ALERTS - SNS TOPIC                      ###
  ###############################################################################

  AthenaReportingAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ProjectName}-athena-reporting-alerts
      DisplayName: Athena Reporting and Alerts Notifications

  AthenaReportingAlertsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref AthenaReportingAlertsSlackEmail
      TopicArn: !Ref AthenaReportingAlertsTopic

  ###############################################################################
  ###        ATHENA REPORTING ALERTS SCHEDULER LAMBDA                         ###
  ###############################################################################

  ReportingAlertsSchedulerLogGroup:
    Type: AWS::CloudFormation::Stack
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TemplateURL: !Sub ${TemplateBucketBaseUrl}/fragments/log-group.yaml
      Parameters:
        LogGroupName: !Sub ${ProjectName}-AthenaReportingAlertsScheduler
        LogGroupRetention: 14
        LogGroupPrefix: /aws/lambda

  ReportingAlertsSchedulerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-AthenaReportingAlertsSchedulerLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ManageEventBridgeSchedules
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ListAndGetSchedules
                Effect: Allow
                Action:
                  - scheduler:ListSchedules
                  - scheduler:GetSchedule
                Resource: "*"
                Condition:
                  StringEquals:
                    'aws:ResourceAccount': !Ref AWS::AccountId
              - Sid: ManageSchedules
                Effect: Allow
                Action:
                  - scheduler:CreateSchedule
                  - scheduler:UpdateSchedule
                  - scheduler:DeleteSchedule
                Resource: !Sub arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/${ProjectName}-athena-reporting-alerts/*
              - Sid: PassSchedulerRole
                Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt ReportingAlertsScheduleExecutionRole.Arn
                Condition:
                  StringEquals:
                    'iam:PassedToService': scheduler.amazonaws.com

  ReportingAlertsSchedulerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !GetAtt ReportingAlertsSchedulerLogGroup.Outputs.LogGroupNameNoPrefix
      Description: Manages EventBridge Schedules dynamically for reporting and alerts queries
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 256
      Timeout: 300
      Role: !GetAtt ReportingAlertsSchedulerLambdaRole.Arn
      Environment:
        Variables:
          CONFIG_GIT_URL: !Ref AthenaReportingAlertsConfigGitUrl
          REPORTING_ALERTS_ARN: !GetAtt ReportingAlertsLambda.Arn
          SCHEDULE_ROLE_ARN: !GetAtt ReportingAlertsScheduleExecutionRole.Arn
          SCHEDULE_GROUP_NAME: !Sub ${ProjectName}-athena-reporting-alerts
          PROJECT_NAME: !Ref ProjectName
      Code:
        S3Bucket: !Ref LambdasBucketName
        S3Key: !Sub ${LambdasBasePath}/athena-reporting-alerts-scheduler.zip
      LoggingConfig:
        LogGroup: !GetAtt ReportingAlertsSchedulerLogGroup.Outputs.LogGroupName

  ReportingAlertsSchedulerAlarms:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplateBucketBaseUrl}/fragments/lambda-alarms.yaml
      Parameters:
        FunctionName: !Ref ReportingAlertsSchedulerLambda
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn

  ReportingAlertsSchedulerTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProjectName}-athena-reporting-alerts-scheduler-trigger
      Description: Triggers Reporting Alerts Scheduler for reconciliation
      ScheduleExpression: !Ref AthenaReportingAlertsSchedulerRate
      State: ENABLED
      Targets:
        - Arn: !GetAtt ReportingAlertsSchedulerLambda.Arn
          Id: reporting-alerts-scheduler-target

  ReportingAlertsSchedulerTriggerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ReportingAlertsSchedulerLambda.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ReportingAlertsSchedulerTriggerRule.Arn

  ###############################################################################
  ###             ATHENA REPORTING ALERTS LAMBDA                              ###
  ###############################################################################

  ReportingAlertsLogGroup:
    Type: AWS::CloudFormation::Stack
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TemplateURL: !Sub ${TemplateBucketBaseUrl}/fragments/log-group.yaml
      Parameters:
        LogGroupName: !Sub ${ProjectName}-AthenaReportingAlerts
        LogGroupRetention: 14
        LogGroupPrefix: /aws/lambda

  ReportingAlertsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-AthenaReportingAlertsRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AthenaQueryExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: GlueCatalogAccess
                Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetDatabase
                Resource:
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${GlueDatabase}
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${GlueDatabase}/*
              - Sid: AthenaExecution
                Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                Resource: !Sub arn:aws:athena:${AWS::Region}:${AWS::AccountId}:workgroup/${AthenaWorkGroup}
              - Sid: AthenaResultsBucketAccess
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${AthenaResultsBucket}
                  - !Sub arn:aws:s3:::${AthenaResultsBucket}/*
              - Sid: LogsBucketReadAccess
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${LogsBucketName}
                  - !Sub arn:aws:s3:::${LogsBucketName}/*
              - Sid: CSVExportAccess
                Effect: Allow
                Action: s3:PutObject
                Resource: !Sub arn:aws:s3:::${AthenaResultsBucket}/athena_query_results/*
              - Sid: KMSKeyAccess
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !Ref LogsBucketKmsKeyArn
              - Sid: PublishToSNS
                Effect: Allow
                Action: sns:Publish
                Resource: !Ref AthenaReportingAlertsTopic

  ReportingAlertsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !GetAtt ReportingAlertsLogGroup.Outputs.LogGroupNameNoPrefix
      Description: Executes Athena reporting and alerts queries with CSV export and Slack notifications
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 512
      Timeout: 900
      Role: !GetAtt ReportingAlertsRole.Arn
      Environment:
        Variables:
          CONFIG_GIT_URL: !Ref AthenaReportingAlertsConfigGitUrl
          OUTPUT_S3_BUCKET: !Ref AthenaResultsBucket
          CSV_S3_PREFIX: athena_query_results
          ATHENA_RESULTS_BUCKET: !Ref AthenaResultsBucket
          ATHENA_DATABASE: !Ref GlueDatabase
          ATHENA_WORKGROUP: !Ref AthenaWorkGroup
          SNS_TOPIC_ARN: !Ref AthenaReportingAlertsTopic
          MAX_WORKERS: "10"
      Code:
        S3Bucket: !Ref LambdasBucketName
        S3Key: !Sub ${LambdasBasePath}/athena-reporting-alerts.zip
      LoggingConfig:
        LogGroup: !GetAtt ReportingAlertsLogGroup.Outputs.LogGroupName

  ReportingAlertsAlarms:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplateBucketBaseUrl}/fragments/lambda-alarms.yaml
      Parameters:
        FunctionName: !Ref ReportingAlertsLambda
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn

  ###############################################################################
  ###            SCHEDULER EXECUTION ROLE & SCHEDULE GROUP                    ###
  ###############################################################################

  ReportingAlertsScheduleExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-AthenaReportingAlertsScheduleExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt ReportingAlertsLambda.Arn

  ReportingAlertsScheduleGroup:
    Type: AWS::Scheduler::ScheduleGroup
    Properties:
      Name: !Sub ${ProjectName}-athena-reporting-alerts

  DataLakeCountExportAlarms:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/lambda-alarms.yaml"
      Parameters:
        FunctionName: !Ref DataLakeCountExport
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn


Outputs:
  GlueDatabaseName:
    Description: Name of the Glue Database
    Value: !Ref GlueDatabase
    Export:
      Name: !Sub ${AWS::StackName}-GlueDatabaseName

  GlueDatabaseArn:
    Description: ARN of the Glue Database
    Value: !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${GlueDatabase}
    Export:
      Name: !Sub ${AWS::StackName}-GlueDatabaseArn
  
  GlueServiceRoleArn:
    Description: ARN of the Glue Service Role
    Value: !GetAtt GlueServiceRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-GlueServiceRoleArn"

  AsseverationGlueTableName:
    Description: Name of the Glue Table for Asseveration
    Value: !Ref AsseverationGlueTable
