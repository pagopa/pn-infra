AWSTemplateFormatVersion: '2010-09-09'
Description: Create Kinesis Firehose Delivery Stream from DynamoDB and Cloudwatch Data Stream

Parameters:
  
  ProjectName:
    Type: String 
    Description: 'Usually pn can be pnXYZ where XYZ are the feature number, useful to create
      experimental environments without crash official development environment'
  
  SourceKinesisDataStreamArn:
    Type: String
    Default: "arn:aws:kinesis:eu-south-1:748275689270:stream/pn-timeline-cdc-stream"
    Description: Kinesis Data Stream ARN - DynamoDB
  SourceKinesisDataStreamKeyArn:
    Type: String
    Default: "arn:aws:kms:eu-south-1:748275689270:key/2e97a2bf-f07d-44c9-b2f2-25a8748096d6"
    Description: Kinesis Data Stream ARN - DynamoDB
  
  LogsBucketName:
    Type: String 
    Description: Name of the destination bucket
  
  LogsExporterRoleArn:
    Type: String 
    Description: Role used to access the S3 bucket where logs are exported
  
  StreamNamePrefix:
    Type: String 
    Description: to distinguish different log groups streams
  
  StreamContent:
    Type: String 
    Description: Stream's logical content type. DYNAMO_CDC or CLOUDWATCH_LOGS
    Default: CLOUDWATCH_LOGS

  AlarmSNSTopicArn:
    Description: The ARN of the Alarm SNS Topic for notifications.
    Type: String
  
  PreprocessingEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable preprocessing Firehose for CDC records

  PreprocessingStreamNamePrefix:
    Type: String
    Default: ""
    Description: Prefix dedicated to the preprocessing POC Firehose

  PreprocessingS3RootPrefix:
    Type: String
    Default: ""
    Description: Root S3 prefix used to isolate CDC preprocessing test data from active paths
  
  PreprocessingTargetTableName:
    Type: String
    Default: "pn-UserAttributes"
    Description: CDC tableName to keep in preprocessing Firehose

  LambdasBucketName:
    Type: String
    Default: ""
    Description: Bucket containing Lambda artifacts

  LambdasBasePath:
    Type: String
    Default: ""
    Description: S3 object key prefix for Lambda artifacts

Conditions:
  ExportLogs: !Not [ !Equals [ !Ref LogsBucketName, '' ] ]

  IsCdcStream: !Equals [ !Ref StreamContent, 'DYNAMO_CDC' ]

  IsPreprocessingEnabled: !Equals [ !Ref PreprocessingEnabled, "true" ]

  CreatePreprocessingFirehose: !And
    - !Condition ExportLogs
    - !Condition IsPreprocessingEnabled


Resources:

  ###########################################################################
  ###     Stream from DynamoDB to S3 using  Kinesys Stream and Firehose   ###
  ###########################################################################

  ## IAM Role
  DeliveryStreamSourceServiceRole:
    Condition: ExportLogs
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
        Version: "2012-10-17"

  ## IAM Policy  
  DeliveryStreamSourceServiceRoleDefaultPolicy:
    Condition: ExportLogs
    Type: AWS::IAM::Policy
    Properties:
      PolicyDocument:
        Statement:
          - Action:
              - kinesis:DescribeStream
              - kinesis:DescribeStreamSummary
              - kinesis:GetRecords
              - kinesis:GetShardIterator
              - kinesis:ListShards
              - kinesis:ListStreams
              - kinesis:SubscribeToShard
            Effect: Allow
            Resource: !Ref SourceKinesisDataStreamArn
          - Action: kms:Decrypt
            Effect: Allow
            Resource: !Ref SourceKinesisDataStreamKeyArn
        Version: "2012-10-17"
      PolicyName: !Sub '${ProjectName}-${StreamNamePrefix}-source-read-policy'
      Roles:
        - Ref: DeliveryStreamSourceServiceRole

  ### - CloudWatchLoggingOptions - LogGroup output kinesis stream 
  #########################################
  DeliveryStreamLogGroup:
    Condition: ExportLogs
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 120
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain

  PreprocessingDeliveryStreamLogGroup:
    Condition: CreatePreprocessingFirehose
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 120
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain

  ### - CloudWatchLoggingOptions - LogStream output kinesis stream 
  #########################################
  DeliveryStreamLogGroupS3Destination:
    Condition: ExportLogs
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName:
        Ref: DeliveryStreamLogGroup
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
  

  LogsKinesisDeliveryStreamPartitioned:
    Condition: ExportLogs
    DependsOn:
      - DeliveryStreamSourceServiceRoleDefaultPolicy
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub '${ProjectName}-${StreamNamePrefix}-delivery-stream-v1'
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !Ref SourceKinesisDataStreamArn
        RoleARN: 
          Fn::GetAtt:
            - DeliveryStreamSourceServiceRole
            - Arn
      ExtendedS3DestinationConfiguration: 
        BucketARN: !Sub arn:aws:s3:::${LogsBucketName}
        BufferingHints:
          IntervalInSeconds: 60
          SizeInMBs: 64
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName:
            Ref: DeliveryStreamLogGroup
          LogStreamName:
            Ref: DeliveryStreamLogGroupS3Destination
        FileExtension:
          Fn::If:
            - IsCdcStream
            - !Ref AWS::NoValue
            - '.gz'
        Prefix:
          Fn::If:
            - IsCdcStream
            - !Sub '${StreamNamePrefix}/TABLE_NAME_!{partitionKeyFromQuery:TABLE_NAME}/!{timestamp:yyyy}/!{timestamp:MM}/!{timestamp:dd}/!{timestamp:HH}/'
            - !Sub '${StreamNamePrefix}/'
        ErrorOutputPrefix: !Sub 'errors/${StreamNamePrefix}/'
        RoleARN: !Ref LogsExporterRoleArn
        DynamicPartitioningConfiguration:
          Enabled: !If [ IsCdcStream, true, false ]
        ProcessingConfiguration:
          Fn::If: 
            - IsCdcStream
            - Enabled: true
              Processors:
              - Type: AppendDelimiterToRecord
                Parameters:
                - ParameterName: Delimiter
                  ParameterValue: "\\n"
              - Type: MetadataExtraction
                Parameters:
                - ParameterName: MetadataExtractionQuery
                  ParameterValue: '{ TABLE_NAME : (if .dynamodb.NewImage.communicationType.S == "INFORMAL" then (.tableName + "_INFORMAL") else .tableName end) }'
                - ParameterName: JsonParsingEngine
                  ParameterValue: JQ-1.6
            - Enabled: false
      # DeliveryStreamEncryptionConfigurationInput: 
      #   KeyARN: !GetAtt LogsKinesisDeliveryStreamKmsKey.Arn
      #   KeyType: CUSTOMER_MANAGED_CMK

  PreprocessingDeliveryStreamLogGroupS3Destination:
    Condition: CreatePreprocessingFirehose
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName:
        Ref: PreprocessingDeliveryStreamLogGroup
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
  

  PreprocessingFilterLambdaRole:
    Condition: CreatePreprocessingFirehose
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${PreprocessingStreamNamePrefix}-lambda-role'
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  PreprocessingFilterLambda:
    Condition: CreatePreprocessingFirehose
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Timeout: 60
      MemorySize: 128
      Handler: index.lambda_handler
      FunctionName: !Sub '${ProjectName}-${PreprocessingStreamNamePrefix}-filter-user-attributes'
      Code:
        S3Bucket: !Ref LambdasBucketName
        S3Key: !Sub '${LambdasBasePath}/cdc-preproc-filter-user-attributes.zip'
      Environment:
        Variables:
          TARGET_TABLE_NAME: !Ref PreprocessingTargetTableName
      Role: !GetAtt PreprocessingFilterLambdaRole.Arn

  PreprocessingLogsKinesisDeliveryStreamPartitioned:
    Condition: CreatePreprocessingFirehose
    DependsOn:
      - DeliveryStreamSourceServiceRoleDefaultPolicy
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub '${ProjectName}-${PreprocessingStreamNamePrefix}-delivery-stream-v1'
      DeliveryStreamType: KinesisStreamAsSource

      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !Ref SourceKinesisDataStreamArn
        RoleARN:
          Fn::GetAtt:
            - DeliveryStreamSourceServiceRole
            - Arn

      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub arn:aws:s3:::${LogsBucketName}

        BufferingHints:
          IntervalInSeconds: 60
          SizeInMBs: 64

        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName:
            Ref: PreprocessingDeliveryStreamLogGroup
          LogStreamName:
            Ref: PreprocessingDeliveryStreamLogGroupS3Destination

        Prefix: 
          !Sub '${PreprocessingS3RootPrefix}/!{partitionKeyFromLambda:PROCESSING_LAYER}/TABLE_NAME=!{partitionKeyFromLambda:TABLE_NAME}/!{timestamp:yyyy}/!{timestamp:MM}/!{timestamp:dd}/!{timestamp:HH}/'
        ErrorOutputPrefix:
          !Sub 'errors/${PreprocessingS3RootPrefix}/!{firehose:error-output-type}/!{timestamp:yyyy}/!{timestamp:MM}/!{timestamp:dd}/!{timestamp:HH}/'

        RoleARN: !Ref LogsExporterRoleArn

        DynamicPartitioningConfiguration:
          Enabled: true
          RetryOptions:
            DurationInSeconds: 300

        ProcessingConfiguration:
          Enabled: true
          Processors:
            - Type: Lambda
              Parameters:
                - ParameterName: LambdaArn
                  ParameterValue: !GetAtt PreprocessingFilterLambda.Arn
                - ParameterName: BufferSizeInMBs
                  ParameterValue: "1"
                - ParameterName: BufferIntervalInSeconds
                  ParameterValue: "60"
                - ParameterName: NumberOfRetries
                  ParameterValue: "3"
        
            - Type: AppendDelimiterToRecord
              Parameters:
                - ParameterName: Delimiter
                  ParameterValue: "\\n"

  # CloudWatch metric to filer error lines, in Log group
  DeliveryStreamErrorLogsMetricFilter:
    Condition: ExportLogs
    DependsOn:
      - DeliveryStreamLogGroup
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref DeliveryStreamLogGroup
      FilterPattern: '?S3 ?InternalError'
      MetricTransformations:
        - MetricValue: 1
          MetricNamespace: "LogsExport"
          MetricName: !Sub "${ProjectName}-${StreamNamePrefix}-kinesis-error"

  # Create alarm
  DeliveryStreamErrorLogsMetricAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn:
      - DeliveryStreamErrorLogsMetricFilter
    Properties:
      AlarmName: !Sub "${ProjectName}-${StreamNamePrefix}-Kinesis-Alarm"
      AlarmDescription: "CloudWatch alarm for when S3 firehose delivery error log has one line."
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmSNSTopicArn
      OKActions:
        - !Ref AlarmSNSTopicArn
      DatapointsToAlarm: 1
      MetricName: !Sub "${ProjectName}-${StreamNamePrefix}-kinesis-error"
      Namespace: "LogsExport"
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 60
      Period: 60
      Statistic: Sum
      Threshold: 1

  PreprocessingDeliveryStreamErrorLogsMetricFilter:
    Condition: CreatePreprocessingFirehose
    DependsOn:
      - PreprocessingDeliveryStreamLogGroup
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref PreprocessingDeliveryStreamLogGroup
      FilterPattern: '?S3 ?InternalError'
      MetricTransformations:
        - MetricValue: 1
          MetricNamespace: "LogsExport"
          MetricName: !Sub "${ProjectName}-${PreprocessingStreamNamePrefix}-kinesis-error"
  
  PreprocessingDeliveryStreamErrorLogsMetricAlarm:
    Condition: CreatePreprocessingFirehose
    DependsOn:
      - PreprocessingDeliveryStreamErrorLogsMetricFilter
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${PreprocessingStreamNamePrefix}-Kinesis-Alarm"
      AlarmDescription: "CloudWatch alarm for preprocessing Firehose delivery error logs."
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmSNSTopicArn
      OKActions:
        - !Ref AlarmSNSTopicArn
      DatapointsToAlarm: 1
      MetricName: !Sub "${ProjectName}-${PreprocessingStreamNamePrefix}-kinesis-error"
      Namespace: "LogsExport"
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 60
      Period: 60
      Statistic: Sum
      Threshold: 1

Outputs:
  DeliveryStreamErrorLogsMetricAlarmArn:
    Description: 'ARN of delivery stream error log alarm'
    Value: !GetAtt DeliveryStreamErrorLogsMetricAlarm.Arn

  DeliveryStreamArn:
    Description: 'ARN of delivery stream'
    Value: !GetAtt LogsKinesisDeliveryStreamPartitioned.Arn
  
  PreprocessingDeliveryStreamArn:
    Condition: CreatePreprocessingFirehose
    Description: 'ARN of preprocessing Firehose delivery stream'
    Value: !GetAtt PreprocessingLogsKinesisDeliveryStreamPartitioned.Arn

  PreprocessingDeliveryStreamErrorLogsMetricAlarmArn:
    Condition: CreatePreprocessingFirehose
    Description: 'ARN of preprocessing Firehose delivery stream error log alarm'
    Value: !GetAtt PreprocessingDeliveryStreamErrorLogsMetricAlarm.Arn

