AWSTemplateFormatVersion: 2010-09-09
Description: 'This template deploys the WAF for an ALB'
Parameters:

  ApplicationLoadBalancerArn:
    Type: String
    Description: The ARN of the Application Load Balancer to attach the WebACL to

  ThrottledPathsRegexp:
    Type: String
    Default: '(/throttled/.*)|(/TH/.*)'
    Description: | 
      This parameter is used twice.
       - First of all IF the request path DO NOT MATCH this regexp the ACL ALLOW that request
       - IF the request path MATCH this regexp the ACL apply headers dimension check and throttling

  ThrottlingGroupString:
    Type: String
    Default: 'radd-alt'
    Description: | 
      This parameter is used twice.
       - First of all IF the request path DO NOT MATCH this regexp the ACL ALLOW that request
       - IF the request path MATCH this regexp the ACL apply headers dimension check and throttling

  MaxRequestPerThrottlingPeriod:
    Type: Number
    MinValue: 25
    MaxValue: 2000000000
    Description: |
      Number of request allowed in a duration of ThrottlingPeriodSeconds for each aggregation key
      provided in the header x-pagopa-pn-custom-throttling-value

  ThrottlingPeriodSeconds:
    Type: Number
    AllowedValues: [60, 120, 300, 600]
    Description: Throttling period duration

  AlarmSNSTopicArn:
    Type: String
    Description: "ARN of the SNS topic for alarm notifications. If empty, no alarms get created"
    Default: ''

  LogRetentionDays:
    Type: Number
    Description: "The number of days to retain WAF logs in the CloudWatch Log Group."
    Default: 14

  BlockedRequestsAlarmThresholdPercent:
    Type: Number
    Description: "The percentage threshold over total requests that triggers the blocked requests alarm."
    Default: 10

  BlockedRequestsMinTraffic:
    Type: Number
    Description: "Minimum total requests required before evaluating the standard blocked requests alarm."
    Default: 10

  BlockedRequestsAlarmPeriodSeconds:
    Type: Number
    Description: "Period in seconds used by the standard blocked requests alarm."
    Default: 60

  BlockedRequestsAlarmEvaluationPeriods:
    Type: Number
    Description: "Number of evaluation periods for the standard blocked requests alarm."
    Default: 20

  BlockedRequestsAlarmDatapointsToAlarm:
    Type: Number
    Description: "Number of breaching datapoints required to trigger the standard blocked requests alarm."
    Default: 10

  OncallBlockedRequestsAlarmThresholdPercent:
    Type: String
    Description: "If set, creates the oncall blocked requests alarm using this percentage threshold over total requests."
    Default: ''

  OncallBlockedRequestsMinTraffic:
    Type: Number
    Description: "Minimum total requests required before evaluating the oncall blocked requests alarm."
    Default: 10

  OncallBlockedRequestsAlarmPeriodSeconds:
    Type: Number
    Description: "Period in seconds used by the oncall blocked requests alarm."
    Default: 60

  OncallBlockedRequestsAlarmEvaluationPeriods:
    Type: Number
    Description: "Number of evaluation periods for the oncall blocked requests alarm."
    Default: 20

  OncallBlockedRequestsAlarmDatapointsToAlarm:
    Type: Number
    Description: "Number of breaching datapoints required to trigger the oncall blocked requests alarm."
    Default: 10

Conditions:

  HasAlarmTopic: !Not [!Equals [!Ref AlarmSNSTopicArn, '']]
  RequiresOncallBlockedRequestsAlarm: !And [!Condition HasAlarmTopic, !Not [!Equals [!Ref OncallBlockedRequestsAlarmThresholdPercent, '']]]

Resources:

  ApplicativeThrottlingWafLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub 'aws-waf-logs-pn-applicative-throttling-${ThrottlingGroupString}'
      RetentionInDays: !Ref LogRetentionDays

  ApplicativeThrottlingWafLoggingConfiguration:
    Type: AWS::WAFv2::LoggingConfiguration
    Properties:
      ResourceArn: !GetAtt ApplicativeThrottlingWebACL.Arn
      LoggingFilter:
        DefaultBehavior: DROP
        Filters:
          - Behavior: KEEP
            Conditions:
              - ActionCondition:
                  Action: BLOCK
            Requirement: MEETS_ALL
      LogDestinationConfigs:
        - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:aws-waf-logs-pn-applicative-throttling-${ThrottlingGroupString}'
    DependsOn:
      - ApplicativeThrottlingWafLogGroup

  ######### WEB ACL ########
  ThrottlingWebACLForALBAttach:
    Type: AWS::WAFv2::WebACLAssociation
    Properties: 
      ResourceArn: !Ref ApplicationLoadBalancerArn
      WebACLArn: !GetAtt ApplicativeThrottlingWebACL.Arn

  ApplicativeThrottlingWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}'
      Scope: REGIONAL
      Description: !Sub 'WebACL che permette di limitare il numero di invocazioni alle API del gruppo ${ThrottlingGroupString}'
      DefaultAction:
        Allow:
          CustomRequestHandling:
            InsertHeaders:
              - Name: !Sub 'x-pagopa-pn-waf-applicative-throttling-${ThrottlingGroupString}'
                Value: passed
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub 'applicative-throttling-${ThrottlingGroupString}-webacl-metric'
      CustomResponseBodies:
        BlockThrottling:
          ContentType: TEXT_PLAIN
          Content: Too many requests
        BlockTooBig:
          ContentType: TEXT_PLAIN
          Content: Request too Big
      Rules:
        - Name: AllowNotMatchingUris
          Priority: 0
          Action:
            Allow:
              CustomRequestHandling:
                InsertHeaders:
                  - Name: !Sub 'x-pagopa-pn-waf-applicative-throttling-${ThrottlingGroupString}'
                    Value: passed
          Statement:
            NotStatement:
                 Statement:          
                  RegexMatchStatement: # Match URI
                    TextTransformations:
                      - Priority: 0
                        Type: NONE
                    RegexString: !Ref ThrottledPathsRegexp
                    FieldToMatch:
                      UriPath: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}-rule-allow-nonmatching-uris-metric'
        - Name: BlockTooBigHeaders
          Priority: 1
          Action:
            Block:
              CustomResponse:
                ResponseCode: 400
                CustomResponseBodyKey: BlockTooBig
          Statement:
            RegexMatchStatement: # MATCH ONLY IF THE HEADERS ARE TOO BIG
              TextTransformations:
                - Priority: 0
                  Type: NONE
              RegexString: '^no-matching-header-regexp--$'
              FieldToMatch:
                Headers:
                  MatchPattern:
                    All: {}
                  MatchScope: KEY 
                  OversizeHandling: MATCH 
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}-rule-block-toobig-headers-metric'
        - Name: ThrottlingStatement
          Priority: 2
          Action:
            Block:
              CustomResponse:
                ResponseCode: 412
                CustomResponseBodyKey: BlockThrottling
          Statement:
            RateBasedStatement:
              AggregateKeyType: CUSTOM_KEYS
              CustomKeys:
                - Header: 
                    Name: x-pagopa-pn-custom-throttling-value
                    TextTransformations:
                      - Priority: 0
                        Type: NONE
              Limit: !Ref MaxRequestPerThrottlingPeriod
              EvaluationWindowSec: !Ref ThrottlingPeriodSeconds
              ScopeDownStatement:
                AndStatement:
                  Statements:
                    - RegexMatchStatement: # Match URI
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                        RegexString: !Ref ThrottledPathsRegexp
                        FieldToMatch:
                          UriPath: {}
                    -  RegexMatchStatement: # MATCH HEADER
                        TextTransformations:
                          - Priority: 0
                            Type: NONE
                        RegexString: !Ref ThrottlingGroupString
                        FieldToMatch:
                          Headers:
                            MatchPattern:
                              IncludedHeaders:
                                - "x-pagopa-pn-custom-throttling-group"
                            MatchScope: VALUE 
                            OversizeHandling: MATCH 
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}-rule-throttling-metric'

  ApplicativeThrottlingBlockedRequestsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlarmTopic
    Properties:
      AlarmName: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}-BlockedRequestsAlarm'
      AlarmDescription: "CloudWatch alarm for when the percentage of blocked requests exceeds the configured threshold"
      Metrics:
        - Id: m1
          MetricStat:
            Metric:
              Dimensions:
                - Name: "Region"
                  Value: !Ref AWS::Region
                - Name: "WebACL"
                  Value: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}'
                - Name: "Rule"
                  Value: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}-rule-throttling-metric'
              MetricName: "BlockedRequests"
              Namespace: "AWS/WAFV2"
            Period: !Ref BlockedRequestsAlarmPeriodSeconds
            Stat: Sum
          ReturnData: False
        - Id: m2
          MetricStat:
            Metric:
              Dimensions:
                - Name: "Region"
                  Value: !Ref AWS::Region
                - Name: "WebACL"
                  Value: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}'
                - Name: "Rule"
                  Value: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}-rule-throttling-metric'
              MetricName: AllowedRequests
              Namespace: "AWS/WAFV2"
            Period: !Ref BlockedRequestsAlarmPeriodSeconds
            Stat: Sum
          ReturnData: False
        - Id: e1
          Expression: !Sub 'IF(m1+m2>${BlockedRequestsMinTraffic} AND m1/(m1+m2)>=${BlockedRequestsAlarmThresholdPercent}/100, 1, 0)'
          Label: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}-BlockedRequestsAlarm-Metric'
      TreatMissingData: "notBreaching"
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      EvaluationPeriods: !Ref BlockedRequestsAlarmEvaluationPeriods
      DatapointsToAlarm: !Ref BlockedRequestsAlarmDatapointsToAlarm
      AlarmActions:
        - !Ref AlarmSNSTopicArn
      OKActions:
        - !Ref AlarmSNSTopicArn

  OncallApplicativeThrottlingBlockedRequestsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: RequiresOncallBlockedRequestsAlarm
    Properties:
      AlarmName: !Sub 'oncall-pn-applicative-throttling-${ThrottlingGroupString}-BlockedRequestsAlarm'
      AlarmDescription: "CloudWatch oncall alarm for when the percentage of blocked requests exceeds the configured threshold"
      Metrics:
        - Id: m1
          MetricStat:
            Metric:
              Dimensions:
                - Name: "Region"
                  Value: !Ref AWS::Region
                - Name: "WebACL"
                  Value: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}'
                - Name: "Rule"
                  Value: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}-rule-throttling-metric'
              MetricName: "BlockedRequests"
              Namespace: "AWS/WAFV2"
            Period: !Ref OncallBlockedRequestsAlarmPeriodSeconds
            Stat: Sum
          ReturnData: False
        - Id: m2
          MetricStat:
            Metric:
              Dimensions:
                - Name: "Region"
                  Value: !Ref AWS::Region
                - Name: "WebACL"
                  Value: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}'
                - Name: "Rule"
                  Value: !Sub 'pn-applicative-throttling-${ThrottlingGroupString}-rule-throttling-metric'
              MetricName: AllowedRequests
              Namespace: "AWS/WAFV2"
            Period: !Ref OncallBlockedRequestsAlarmPeriodSeconds
            Stat: Sum
          ReturnData: False
        - Id: e1
          Expression: !Sub 'IF(m1+m2>${OncallBlockedRequestsMinTraffic} AND m1/(m1+m2)>=${OncallBlockedRequestsAlarmThresholdPercent}/100, 1, 0)'
          Label: !Sub 'oncall-pn-applicative-throttling-${ThrottlingGroupString}-BlockedRequestsAlarm-Metric'
      TreatMissingData: "notBreaching"
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      EvaluationPeriods: !Ref OncallBlockedRequestsAlarmEvaluationPeriods
      DatapointsToAlarm: !Ref OncallBlockedRequestsAlarmDatapointsToAlarm
      AlarmActions:
        - !Ref AlarmSNSTopicArn
      OKActions:
        - !Ref AlarmSNSTopicArn
