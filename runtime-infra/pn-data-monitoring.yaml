  AnalogRecipientEventsQueue:
    Type: AWS::CloudFormation::Stack
    Condition: IsCoreAccount
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/sqs-queue.yaml"
      Parameters:
        QueueName: !Sub '${ProjectName}-analog-recipient-events'
        VisibilityTimeout: 900 # max time for Lambda to process the message
        DelaySeconds: 1
        AlarmSNSTopicName: !Ref AlarmSNSTopicName

  CriticalMonitoringNotificationEventsQueue:
    Type: AWS::CloudFormation::Stack
    Condition: IsCoreAccount
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/sqs-queue.yaml"
      Parameters:
        QueueName: !Sub '${ProjectName}-critical-monitoring-notification-events'
        VisibilityTimeout: 900 # max time for Lambda to process the message
        DelaySeconds: 1
        AlarmSNSTopicName: !Ref AlarmSNSTopicName

  AnalogRecipientEventsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Condition: IsCoreAccount
    Properties:
      Queues:
        - !GetAtt AnalogRecipientEventsQueue.Outputs.QueueURL
        - !GetAtt CriticalMonitoringNotificationEventsQueue.Outputs.QueueURL
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: 
              - !GetAtt AnalogRecipientEventsQueue.Outputs.QueueARN
              - !GetAtt CriticalMonitoringNotificationEventsQueue.Outputs.QueueARN
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt PnCoreEventBusToAnalogRecipientEventsQueue.Arn

  PnCoreEventBusToAnalogRecipientEventsQueue:
    Type: AWS::Events::Rule
    Condition: IsCoreAccount
    Properties: 
      Description: Route Analog Recipient Events (CON080) to analog monitoring queues
      EventBusName: !Ref EventBusToAnalogRecipientEventsQueueName
      EventPattern:
        detail-type: [ "ExternalChannelOutcomeEvent" ]
        detail:
          clientId: [ !Ref AnalogRecipientExtChUser ]
          analogMail:
            statusCode: [ "CON080" ]
      Targets: 
        - Id: !Sub '${ProjectName}-CoreEventBus-AnalogRecipientEvents'
          Arn: !GetAtt AnalogRecipientEventsQueue.Outputs.QueueARN
          InputPath: $.detail
        - Id: !Sub '${ProjectName}-CoreEventBus-CriticalMonitoringNotificationEvents'
          Arn: !GetAtt CriticalMonitoringNotificationEventsQueue.Outputs.QueueARN
          InputPath: $.detail

  SafeStorageErrorEventsQueue:
    Type: AWS::CloudFormation::Stack
    Condition: IsCoreAccount
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/sqs-queue.yaml"
      Parameters:
        QueueName: !Sub '${ProjectName}-safe-storage-error-events-DLQ'
        HasDLQ: 'false'
        VisibilityTimeout: 300 
        QueueHasAlarm: 'true'
        DelaySeconds: 1
        AlarmSNSTopicName: !Ref AlarmSNSTopicName

  SafeStorageErrorEventsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Condition: IsCoreAccount
    Properties:
      Queues:
        - !GetAtt SafeStorageErrorEventsQueue.Outputs.QueueURL
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt SafeStorageErrorEventsQueue.Outputs.QueueARN
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt SafeStorageErrorEventsRule.Arn

  SafeStorageErrorEventsRule:
    Type: AWS::Events::Rule
    Condition: IsCoreAccount
    Properties: 
      Description: Route Safe Storage Error Events to DLQ
      EventBusName: !Ref EventBusToAnalogRecipientEventsQueueName
      EventPattern:
        source: [ "GESTORE DISPONIBILITA" ]
        detail-type: [ "SafeStorageTransformEvent" ]
        detail:
          documentStatus: [ "ERROR" ]
      Targets: 
        - Id: !Sub '${ProjectName}-SafeStorageErrorEvents'
          Arn: !GetAtt SafeStorageErrorEventsQueue.Outputs.QueueARN

