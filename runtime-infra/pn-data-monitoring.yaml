      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PnCriticalMonitoringNotificationAnalyzerLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${DataMonitoringBucket}
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub arn:aws:s3:::${DataMonitoringBucket}/critical-monitoring/*
              - Effect: Allow
                Action:
                  - logs:CreateLogStream  
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/pn-critical-monitoring-notification-analyzer-lambda:*
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref DeliveryMonitoringTopic 
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: 
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/pn-Notifications
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/pn-Timelines
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: 
                  - !GetAtt CriticalMonitoringNotificationEventsQueue.Outputs.QueueARN

  PnCriticalMonitoringNotificationAnalyzerLambdaLogGroup:
    Type: AWS::CloudFormation::Stack
    Condition: IsCoreAccount
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL: !Sub ${TemplateBucketBaseUrl}/fragments/log-group.yaml
      Parameters:
        LogGroupName: !Ref PnCriticalMonitoringNotificationAnalyzerLambda
        LogGroupRetention: 14
        LogGroupPrefix: /aws/lambda

  PnCriticalMonitoringNotificationAnalyzerLambdaAlarms:
    Condition: IsCoreAccount
    DependsOn:
      - PnCriticalMonitoringNotificationAnalyzerLambdaLogGroup
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/lambda-alarms.yaml"
      Parameters:
        FunctionName: !Ref PnCriticalMonitoringNotificationAnalyzerLambda
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn
        FilterPattern: "ERROR"

  PnCriticalMonitoringNotificationAnalyzerLambdaEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Condition: IsCoreAccount
    Properties:
      BatchSize: 100
      MaximumBatchingWindowInSeconds: 300
      Enabled: !Ref CriticalMonitoringNotificationAnalyzerMappingEnabled
      EventSourceArn: !GetAtt CriticalMonitoringNotificationEventsQueue.Outputs.QueueARN
      FunctionName: !Ref PnCriticalMonitoringNotificationAnalyzerLambda

  CriticalMonitoringGlueDatabase:
    Type: AWS::Glue::Database
    Condition: IsCoreAccount
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref CriticalMonitoringGlueDatabaseName
        Description: Glue database for critical monitoring artifacts

  CriticalMonitoringNotificationGlueTable:
    Type: AWS::Glue::Table
    Condition: IsCoreAccount
    DependsOn:
      - CriticalMonitoringGlueDatabase
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref CriticalMonitoringGlueDatabaseName
      TableInput:
        Name: critical_monitoring_notification
        Description: Records generated by pn-critical-monitoring-notification-analyzer-lambda
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: json
          typeOfData: file
          EXTERNAL: 'TRUE'
          has_encrypted_data: 'false'
        PartitionKeys:
          - Name: year
            Type: string
          - Name: month
            Type: string
          - Name: day
            Type: string
          - Name: hour
            Type: string
        StorageDescriptor:
          Location: !Sub s3://${DataMonitoringBucket}/critical-monitoring/
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          Compressed: false
          NumberOfBuckets: -1
          StoredAsSubDirectories: true
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
            Parameters:
              paths: requestId,codiceOggetto,recapitista,cap
          Columns:
            - Name: requestId
              Type: string
            - Name: codiceOggetto
              Type: string
            - Name: recapitista
              Type: string
            - Name: cap
              Type: string

Outputs:
  DataMonitoringBucketName:
    Value: !Ref DataMonitoringBucket
    Description: Name of the bucket created for the data monitoring
