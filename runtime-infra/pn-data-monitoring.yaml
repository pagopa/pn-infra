AWSTemplateFormatVersion: 2010-09-09
Description: 'This template deploys the resources for the data monitoring'

Parameters:  
  ConfinfoDynamoDbExportBucketName:
    Type: String
    Default: ''
    Description: Name of the confinfo bucket created for the data monitoring (leave blank in Confinfo account)

  PnCoreAwsAccountId:
    Type: String
    Description: Core Account ID (leave blank in Core account)
    Default: ''

  ParquetBucketPath:
    Type: String
    Description: parquet files s3 bucket path
    Default: 'parquet'

  ReportsBucketPath:
    Type: String
    Description: reports files bucket path
    Default: 'reports'

  LogsBucketName:
    Type: String
    Description: Name of the logs bucket

  LogsBucketKmsKeyArn:
    Type: String
    Description: Name of the logs bucket KMS key ARN

  DataMonitoringIndexCronExpression:
    Type: String
    Description: Cron expression for the scheduled rule, e.g. cron(0 9 * * ? *)
    Default: 'cron(30 6 * * ? *)'

  #Dynamodb export parameters:

  DynamoDbExportTableNames:
    Type: String
    Default: ""
    Description: DynamoDB List of Table to export

  DynamoDbExportPrefix:
    Type: String
    Description: String Prefix after S3Prefix
    Default: incremental2024

  EnvironmentType:
    Type: String
    Description: Environment type (e.g. dev, test, prod)

  DataMonitoringScriptVersion:
    Type: String
    Description: Version of the bi_or_not_bi__ec_metadata scripts
    Default: ec_metadata_extract_v0_2

  DataMonitoringPrototypeVersion:
    Type: String
    Description: Version of the pn-prototype scripts
    Default: main

  DataLakeAccountId:
    Type: String
    Description: Datalake AWS Account ID
    Default: ''
  
  DataLakeRoleName:
    Type: String
    Description: Datalake Role Name
    Default: 'pagopa-pn'
  
  DataAnalysisSlackEmail:
    Type: String
    Description: Slack Email channel
    Default: ''

  LambdaPnSupportExportSqsCronExpression:
    Type: String
    Description: Cron expression for the scheduled rule, e.g. cron(0 9 * * ? *)
    Default: ''

  LambdaPnSupportExportPresignedUrlTimeOfexpiration:
    Type: Number
    Description: Presigned URL Time of Expiration
    Default: 259200

  LambdaPnSupportExportMemorySize:
    Type: Number
    Description: Memory size for the Lambda Support Export function
    Default: 384

  LambdaPnSupportExportSqsVisibilityTimeoutInSeconds:
    Type: Number
    Description: SQS queue visibility timeout Lambda export function for pn-support
    Default: 360
  
  LambdaPrepareBlockedAnalysisCronExpression:
    Type: String
    Description: Cron expression for the lambda prepare blocked analysis function
    Default: ''
  
  LambdaPrepareBlockedAnalysisEnableCronExpression:
    Type: String
    Description: Cron expression for the scheduled rule enabled/disabled
    Default: 'DISABLED'
    AllowedValues:
      - ENABLED
      - DISABLED
    
  LambdaPrepareBlockedAnalysisMemorySize:
    Type: Number
    Description: Memory size for the Lambda Prepare Blocked Analysis function
    Default: 512

  LambdaPrepareBlockedAnalysisPnTroubleshootingBranch:
    Type: String
    Description: pn-troubleshooting repository branch or tag name (e.g. main, develop)
    Default: 'main'

  CloudWatchNamespace:
    Type: String
    Description: CloudWatch namespace for PrepareBlocked metrics
    Default: 'PrepareBlockedAnalysis'

  MetricNameTotalOpenCases:
    Type: String
    Description: Metric name for total open cases
    Default: 'PrepareBlockedTotalOpenCases'

  MetricNameResolvedInLastRun:
    Type: String
    Description: Metric name for resolved cases in last run
    Default: 'PrepareBlockedResolvedInLastRun'

  MetricNameNewInLastRun:
    Type: String
    Description: Metric name for new cases in last run
    Default: 'PrepareBlockedNewInLastRun'

  MetricNameAffectedPrepare:
    Type: String
    Description: Metric name for affected PREPARE count
    Default: 'AffectedPrepareBlockedAnalysis'

  TemplateBucketBaseUrl:
    Type: String
    Description: URL to load infrastructure model fragments from

  LambdasBucketName:
    Type: String
    Description: S3 bucket name containing Lambda deployment packages

  LambdasBasePath:
    Type: String
    Description: S3 key prefix for Lambda deployment packages
    Default: ''

  ProjectName:
    Type: String
    Description: 'Usually pn can be pnXYZ where XYZ are the feature number, useful to create
      experimental environments without crash official development environment'

  EventBusToAnalogRecipientEventsQueueName:
    Default: ''
    Type: String
    Description: Core Event Bus Name

  AlarmSNSTopicName:
    Type: String
    Description: Alarm SNS Topic Name

  AnalogRecipientExtChUser:
    Type: String
    Default: "pn-cons-000"
    Description: "external channel user dedicated to Analog Recipient Events"

  AnalogRecipientsAnalyzerMappingEnabled:
      Type: String
      Description: Enable or Disable the Event Source Mapping for the PnAnalogRecipientsAnalyzer Lambda Function
      Default: "false"
      AllowedValues:
        - "true"
        - "false"

  CriticalMonitoringNotificationTaxonomyCodes:
    Type: String
    Description: Comma separated taxonomy codes monitored by critical monitoring notification analyzer
    Default: "050501P,050501N"

  CriticalMonitoringNotificationAnalyzerMappingEnabled:
    Type: String
    Description: Enable or Disable the Event Source Mapping for the PnCriticalMonitoringNotificationAnalyzer Lambda Function
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  CriticalMonitoringNotificationSchedulerState:
    Type: String
    Description: State of Critical Monitoring schedulers (ENABLED or DISABLED)
    Default: 'ENABLED'
    AllowedValues:
      - 'ENABLED'
      - 'DISABLED'

  AlarmSNSTopicArn:
    Type: String

  DataAnalysisTopicName:
    Type: String
    Default: ''

  QuickSightTableNames:
    Type: String
    Description: Comma separated QuickSight Table Names to import
    Default: ''

  QuickSightDataImportLambdaCronExpression:
    Type: String
    Description: Cron expression for the QuickSight Data Import Lambda scheduled rule, e.g. cron(0 7 ? * 3 *)
    Default: 'cron(0 7 ? * 3 *)'
  
  QuickSightDataImportLambdaScheduleState:
    Type: String
    Description: State of the QuickSight Data Import Lambda scheduled rule (ENABLED or DISABLED)
    Default: 'DISABLED'
    AllowedValues:
      - 'ENABLED'
      - 'DISABLED'
  
  DeliveryMonitoringSnsTopicName:
    Type: String
    Description: SNS Topic name for Delivery Monitoring notifications
    Default: ''

  DeliveryMonitoringSlackEmail:
    Type: String
    Description: Slack Email channel for Delivery Monitoring notifications
    Default: ''

  CriticalMonitoringGlueDatabaseName:
    Type: String
    Description: Glue database name for critical monitoring exported files
    Default: monitoring_database

Conditions:
  IsConfinfoAccount: !Not [ !Equals [!Ref PnCoreAwsAccountId, '' ] ]
  IsCoreAccount: !Equals [!Ref PnCoreAwsAccountId, '' ]
  IsDatalakeAccount: !Not [ !Equals [!Ref DataLakeAccountId, '' ] ]
  IsDatalakeAccountInCore: !And [ !Condition IsDatalakeAccount, !Condition IsCoreAccount ]
  HasCronExpression: !Not [ !Equals [!Ref DataMonitoringIndexCronExpression, '' ] ]
  HasDynamoDbExportTableNames: !Not [ !Equals [!Ref DynamoDbExportTableNames, '' ] ]
  HasCronExpressionLambdaPnSupportSqsInCoreAccount: !And [!Not [!Equals [!Ref LambdaPnSupportExportSqsCronExpression, '']], !Equals [!Ref PnCoreAwsAccountId, '']]
  HasQuickSightDataImportLambdaScheduleStateEnabled: !And [ !Condition IsCoreAccount, !Equals [!Ref QuickSightDataImportLambdaScheduleState, 'ENABLED' ] ]
  HasCriticalMonitoringSchedulerStateEnabled: !And [ !Condition IsCoreAccount, !Equals [!Ref CriticalMonitoringNotificationSchedulerState, 'ENABLED' ] ]
  
Resources:
  
  # s3 bucket with name BucketName
  DataMonitoringBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub pn-datamonitoring-${AWS::Region}-${AWS::AccountId}
      PublicAccessBlockConfiguration: 
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256         
        
          
  DataMonitoringBucketPolicy:
    Condition: IsConfinfoAccount
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataMonitoringBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "s3:Get*"
              - "s3:List*"              
            Resource: 
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}"
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}/*"   
            Principal:
              AWS: 
                - !Sub "arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:root"
            Condition:
              ArnLike:
                aws:PrincipalArn:
                  - !Sub "arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:role/pn-data-monitoring-codebuild-role"
                  - !Sub "arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:role/pn-data-monitoring-ec2-service-role"
                  - !Sub "arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:instance-profile/pn-data-monitoring-ec2-instance-profile"
                  - !Sub "arn:${AWS::Partition}:sts::${PnCoreAwsAccountId}:assumed-role/pn-data-monitoring-ec2-service-role/*"
          - Sid: AllowAthenaList
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:root"
            Action:
              - "s3:List*"
            Resource:
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}"
            Condition:
              ForAnyValue:StringEquals:
                "aws:CalledVia": "athena.amazonaws.com"
          - Sid: AllowAthenaGet
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:root"
            Action:
              - "s3:Get*"
            Resource:
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}/*"
            Condition:
              ForAnyValue:StringEquals:
                "aws:CalledVia": "athena.amazonaws.com"
          - Effect: Allow
            Action:
              - "s3:PutObject"
            Resource: 
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}/${ParquetBucketPath}/*"
            Principal:
              AWS: 
                - !Sub "arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:root"
            Condition:
              ArnLike:
                aws:PrincipalArn:
                  - !Sub "arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:role/pn-data-monitoring-codebuild-role"
                  - !Sub "arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:role/pn-data-monitoring-ec2-service-role"
                  - !Sub "arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:instance-profile/pn-data-monitoring-ec2-instance-profile"
                  - !Sub "arn:${AWS::Partition}:sts::${PnCoreAwsAccountId}:assumed-role/pn-data-monitoring-ec2-service-role/*"
          - Fn::If:
            - IsDatalakeAccount
            - Effect: Allow
              Action:
                - "s3:Get*"
                - "s3:List*"
              Resource:
                - !Sub "arn:aws:s3:::${DataMonitoringBucket}"
                - !Sub "arn:aws:s3:::${DataMonitoringBucket}/*"
              Principal:
                AWS:
                  - !Sub "arn:${AWS::Partition}:iam::${DataLakeAccountId}:root"
              Condition:
                ArnLike:
                  aws:PrincipalArn:
                    - !Sub "arn:${AWS::Partition}:iam::${DataLakeAccountId}:role/${DataLakeRoleName}"
            - !Ref AWS::NoValue

  DataMonitoringBucketPolicyCore:
    Condition: IsDatalakeAccountInCore
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataMonitoringBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "s3:Get*"
              - "s3:List*"
            Resource:
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}"
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}/*"
            Principal:
              AWS:
                - !Sub "arn:${AWS::Partition}:iam::${DataLakeAccountId}:root"
            Condition:
              ArnLike:
                aws:PrincipalArn:
                  - !Sub "arn:${AWS::Partition}:iam::${DataLakeAccountId}:role/${DataLakeRoleName}"
  
  DataMonitoringCodebuildProject:
    Type: 'AWS::CodeBuild::Project'
    Properties:
      Name: pn-data-monitoring-codebuild
      ServiceRole: !GetAtt DataMonitoringCodeBuildServiceRole.Arn
      ConcurrentBuildLimit: 1
      TimeoutInMinutes: 360
      Source: 
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - ROOT_FOLDER=$(pwd) && echo ${ROOT_FOLDER}
                - git clone https://github.com/pagopa/pn-troubleshooting.git
                - git clone https://github.com/pagopa/pn-prototypes.git
                - ( cd ${ROOT_FOLDER}/pn-prototypes && git checkout $PROTOTYPE_VERSION )
                - ( cd ${ROOT_FOLDER}/pn-troubleshooting && git checkout $SCRIPTS_VERSION )
            build:
              commands:
                - ROOT_FOLDER=$(pwd) && echo ${ROOT_FOLDER}
                - |
                  cd pn-troubleshooting/bi_or_not_bi__ec_metadata
                  ./cicd_runner.sh \
                      --account-type $ACCOUNT_TYPE \
                      --env-type $ENV_TYPE \
                      --export-bucket-name $EXPORT_BUCKET_NAME \
                      --logs-bucket-name $LOGS_BUCKET_NAME \
                      --resource-root $ROOT_FOLDER/pn-prototypes \
                      --core-bucket-name $CORE_BUCKET \
                      --confinfo-bucket-name $CONFINFO_BUCKET \
                      --timestamp-utc "$DATE_EXECUTION"
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        ComputeType: BUILD_GENERAL1_XLARGE
        Type: LINUX_CONTAINER
        Image: "aws/codebuild/standard:7.0-24.10.02"
        EnvironmentVariables:
          - Name: REGION
            Type: PLAINTEXT
            Value: !Ref AWS::Region
          - Name: EXPORT_BUCKET_NAME
            Type: PLAINTEXT
            Value: !Ref DataMonitoringBucket
          - Name: LOGS_BUCKET_NAME
            Type: PLAINTEXT
            Value: !Ref LogsBucketName
          - Name: ACCOUNT_TYPE
            Type: PLAINTEXT
            Value: !If [IsCoreAccount, "core", "confinfo"]
          - Name: ENV_TYPE
            Type: PLAINTEXT
            Value: !Ref EnvironmentType
          - Name: SCRIPTS_VERSION
            Type: PLAINTEXT
            Value: !Ref DataMonitoringScriptVersion
          - Name: PROTOTYPE_VERSION
            Type: PLAINTEXT
            Value: !Ref DataMonitoringPrototypeVersion
          - Name: CORE_BUCKET
            Type: PLAINTEXT
            Value: !If [IsCoreAccount, !Ref DataMonitoringBucket, !Sub "pn-datamonitoring-${AWS::Region}-${PnCoreAwsAccountId}"]
          - Name: CONFINFO_BUCKET
            Type: PLAINTEXT
            Value: !If [IsCoreAccount, !Ref ConfinfoDynamoDbExportBucketName, !Ref DataMonitoringBucket]
          - Name: DATE_EXECUTION
            Type: PLAINTEXT
            Value: ""

  DataMonitoringCodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pn-data-monitoring-codebuild-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - "codebuild.amazonaws.com"
            Action:
              - "sts:AssumeRole"
          - Effect: Allow
            Principal:
              AWS:
                - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Condition:
              ArnEquals:
                aws:PrincipalArn: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/pn-data-monitoring-codebuild-role
            Action:
              - "sts:AssumeRole" 

  EC2DataMonitoringInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Condition: IsCoreAccount
    Properties:
      InstanceProfileName: pn-data-monitoring-ec2-instance-profile
      Path: "/"
      Roles:
        - !Ref EC2DataMonitoringServiceRole
  
  EC2DataMonitoringServiceRole:
    Type: AWS::IAM::Role
    Condition: IsCoreAccount
    Properties:
      RoleName: pn-data-monitoring-ec2-service-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - "ec2.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  DataMonitoringEC2ManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: IsCoreAccount
    Properties:
      ManagedPolicyName: pn-data-monitoring-ec2-managed-policy
      Roles:
        - !Ref EC2DataMonitoringServiceRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # lettura su tutto il bucket dei log e parquet
          - Effect: Allow
            Action:
              - "s3:Get*"
              - "s3:List*"
            Resource: 
              - !Sub "arn:aws:s3:::${LogsBucketName}"
              - !Sub "arn:aws:s3:::${LogsBucketName}/*"
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}"
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}/*"
          # Accesso in scrittura al bucket dump dell'account corrente nella cartella parquet
          - Effect: Allow
            Action:
              - "s3:PutObject"
              - "s3:DeleteObject"
            Resource: 
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}/${ParquetBucketPath}/*"
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}/${ReportsBucketPath}/*"
          # Accessi in lettura al bucket dump dell'account confinfo nella cartella parquet
          - Fn::If:
            - IsCoreAccount
            - Effect: Allow
              Action:
                - "s3:Get*"
                - "s3:List*"
              Resource: 
              - !Sub "arn:aws:s3:::${ConfinfoDynamoDbExportBucketName}"
              - !Sub "arn:aws:s3:::${ConfinfoDynamoDbExportBucketName}/${ParquetBucketPath}/*"
            - !Ref AWS::NoValue
          # Accesso in lettura al bucket di confinfo per protocollo S3A
          - Fn::If:
            - IsCoreAccount
            - Effect: Allow
              Action:
                - "s3:ListBucket"
              Resource:
                - !Sub "arn:aws:s3:::${ConfinfoDynamoDbExportBucketName}"
            - !Ref AWS::NoValue
          # Accessi in lettura ai log di pn-delivery
          - Fn::If:
            - IsCoreAccount
            - Effect: Allow
              Action:
                - "logs:StartQuery"
                - "logs:StopQuery"
                - "logs:GetQueryResults"
              Resource: 
              - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/ecs/pn-delivery:*"
            - !Ref AWS::NoValue
          # Allow the use of encryption key
          - Effect: Allow
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: 
              - !Sub "${LogsBucketKmsKeyArn}"

  DataMonitoringCodebuildManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: pn-data-monitoring-codebuild-managed-policy
      Roles:
        - !Ref DataMonitoringCodeBuildServiceRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*
          # lettura su tutto il bucket dei log e parquet
          - Effect: Allow
            Action:
              - "s3:Get*"
              - "s3:List*"
            Resource: 
              - !Sub "arn:aws:s3:::${LogsBucketName}"
              - !Sub "arn:aws:s3:::${LogsBucketName}/*"
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}"
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}/*"
          # Accesso in scrittura al bucket dump dell'account corrente nella cartella parquet
          - Effect: Allow
            Action:
              - "s3:PutObject"
              - "s3:DeleteObject"
            Resource: 
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}/${ParquetBucketPath}/*"
              - !Sub "arn:aws:s3:::${DataMonitoringBucket}/${ReportsBucketPath}/*"
          # Accessi in lettura al bucket dump dell'account confinfo nella cartella parquet
          - Fn::If:
            - IsCoreAccount
            - Effect: Allow
              Action:
                - "s3:Get*"
                - "s3:List*"
              Resource: 
              - !Sub "arn:aws:s3:::${ConfinfoDynamoDbExportBucketName}/${ParquetBucketPath}/*"       
            - !Ref AWS::NoValue
          # Accesso in lettura al bucket di confinfo per protocollo S3A
          - Fn::If:
            - IsCoreAccount
            - Effect: Allow
              Action:
                - "s3:ListBucket"
              Resource:
                - !Sub "arn:aws:s3:::${ConfinfoDynamoDbExportBucketName}"
            - !Ref AWS::NoValue
          # Accessi in lettura ai log di pn-delivery
          - Fn::If:
            - IsCoreAccount
            - Effect: Allow
              Action:
                - "logs:StartQuery"
                - "logs:StopQuery"
                - "logs:GetQueryResults"
              Resource: 
              - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/ecs/pn-delivery:*"
            - !Ref AWS::NoValue
          # Allow the use of encryption key
          - Effect: Allow
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: 
              - !Sub "${LogsBucketKmsKeyArn}"

  DataMonitoringScheduleRole:
    Condition: HasCronExpression
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
        Version: "2012-10-17"
      Policies:
        - PolicyName: runCodeBuild
          PolicyDocument:
            Statement:
              - Sid: startProjectRun
                Action:
                  - "codebuild:*"
                Effect: Allow
                Resource: 
                  - !GetAtt DataMonitoringCodebuildProject.Arn

  IndexScheduledRule:
    Type: AWS::Events::Rule
    Condition: HasCronExpression
    Properties:
      Description: "pn-data-monitoring-codebuild-scheduled-rule"
      # every day at 9 am
      ScheduleExpression: !Ref DataMonitoringIndexCronExpression 
      State: "ENABLED"
      RoleArn: !GetAtt "DataMonitoringScheduleRole.Arn"
      Targets: 
        - Id: "DataMonitoringIndex"
          RoleArn: !GetAtt "DataMonitoringScheduleRole.Arn"
          # Input:
          #   !Sub |
          #     {
          #       "environmentVariablesOverride": {
          #         "cmd": ${Cmd}
          #       }
          #     }
          Arn: 
            Fn::GetAtt: 
              - "DataMonitoringCodebuildProject"
              - "Arn"
        
  DynamoDbExportFunction:
    Type: AWS::Lambda::Function
    Condition: HasDynamoDbExportTableNames
    Properties:
      Runtime: python3.14
      Handler: dynamodb_daily_export_handler.lambda_handler
      FunctionName: Lambda-DailyExport-DynamoDbTable
      Code:
        S3Bucket: !Ref LambdasBucketName
        S3Key: !Sub ${LambdasBasePath}/dynamodb-daily-export.zip
      Environment:
        Variables:
          DynamoDbExportTableNames:
            Ref: DynamoDbExportTableNames
          S3Bucket:
            Ref: DataMonitoringBucket
          Prefix:
            Ref: DynamoDbExportPrefix
          Region: !Ref AWS::Region
          AccountID: !Ref AWS::AccountId


      Role:
        Fn::GetAtt:
          - ExportRole
          - Arn

  ExportRole:
    Type: AWS::IAM::Role
    Condition: HasDynamoDbExportTableNames
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ExportPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:ExportTableToPointInTime
                Resource: arn:aws:dynamodb:*:*:*
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${DataMonitoringBucket}/*
              - Effect: Allow
                Action:
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - "kms:Decrypt"
                Resource: "*"

  Schedule:
    Type: AWS::Events::Rule
    Condition: HasDynamoDbExportTableNames
    Properties:
      ScheduleExpression: cron(0 1 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt DynamoDbExportFunction.Arn
          Id: DynamoDbExportFunction

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Condition: HasDynamoDbExportTableNames
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DynamoDbExportFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt Schedule.Arn
      SourceAccount: !Ref AWS::AccountId

  ExportFunctionLogroup:
    Type: AWS::Logs::LogGroup
    Condition: HasDynamoDbExportTableNames
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DynamoDbExportFunction}"
      RetentionInDays: 3
  
