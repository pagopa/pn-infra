AWSTemplateFormatVersion: 2010-09-09
Description: >-
  IAM Access Analyzer - rilevamento accessi inutilizzati (hub-and-spoke per env).
  Stesso template usato sia in core che in confinfo: la discriminante e' il
  parametro PnCoreAwsAccountId (vuoto = stiamo girando nel core, valorizzato =
  stiamo girando in confinfo). Stesso pattern di pn-data-monitoring.yaml.
  - In core: si crea il bucket S3 centrale dei report, la KMS CMK, la bucket
    policy che accetta scritture cross-account dal confinfo della stessa env,
    la dashboard CloudWatch e l'Analyzer + Lambda esportatrice del core stesso.
  - In confinfo: si crea solo l'Analyzer locale + la Lambda esportatrice, che
    scrive i CSV cross-account nel bucket del core.

# =============================================================================
# NOTE DI DESIGN (non rimuovere senza confronto col team)
# -----------------------------------------------------------------------------
# - Hub-per-env voluto: dev/uat/hotfix/prod restano segregati per requisito
#   PSN/audit. NON unificare in un hub globale.
# - Codice Lambda INLINE (ZipFile) voluto: lo stack al momento NON e' nella
#   pipeline pn-infra. Quando si industrializza, spostare il codice come
#   artefatto versionato in LambdasBucketName / LambdasBasePath, come fanno
#   gli altri template di pn-infra.
# - Single-region: questo template assume una sola region per env. Access
#   Analyzer e' regionale: se PN gira in piu' region, replicare il deploy
#   confinfo per ogni region. Il bucket centrale puo' restare in una sola.
# - Cfg UNICO per env (pn-iam-unused-access-analyzer-<env>-cfg.json). E' lo
#   stesso file sia per il deploy nel core che in confinfo: i parametri
#   PnCoreAwsAccountId / PnConfinfoAwsAccountId / CentralReportsBucketKmsKeyArn
#   vanno valorizzati in modo speculare a seconda dell'account target. Stessa
#   convenzione di pn-data-monitoring.yaml.
#
# TODO (FUTURE EVOLUTIONS, NON IN QUESTA ITERAZIONE):
# - SNS: in futuro va aggiunto un topic SNS in CORE collegato a una rule
#   EventBridge su source 'aws.access-analyzer' detail-type 'Access Analyzer
#   Finding', con subscription verso webhook Slack via chatbot/lambda. Serve
#   per l'alerting real-time sui nuovi findings ad alta severity. Per ora
#   NON implementato: la dashboard CloudWatch + il CSV periodico bastano
#   per la prima iterazione.
# - DynamoDB: in futuro va aggiunto uno state-store per la Lambda
#   esportatrice (checkpoint nextToken, finding-id gia' notificati,
#   timestamp ultimo run riuscito) in modo da gestire i timeout della
#   Lambda (15min) su account con tanti findings. PER SCELTA NON usiamo
#   DynamoDB: lo state verra' salvato come oggetto JSON dedicato sullo
#   stesso bucket S3 dei report (path '<env>/_state/<account>/checkpoint.json'),
#   per ridurre il numero di servizi/costi e mantenere tutta l'evidence
#   nello stesso storage WORM-ready.
# =============================================================================

Parameters:

  ProjectName:
    Type: String
    Description: Prefisso di progetto (es. pn). Allineato agli altri template pn-infra.
    Default: pn

  EnvironmentType:
    Type: String
    Description: Nome ambiente (dev|uat|hotfix|prod).
    AllowedValues: [dev, uat, hotfix, prod]

  PnCoreAwsAccountId:
    Type: String
    Default: ''
    Description: >-
      Account ID dell'account CORE della stessa env. Lasciare VUOTO quando si
      esegue il deploy nell'account core; valorizzare quando si esegue il
      deploy in confinfo. Stessa convenzione usata in pn-data-monitoring.yaml.

  PnConfinfoAwsAccountId:
    Type: String
    Default: ''
    Description: >-
      Account ID dell'account CONFINFO della stessa env. Da valorizzare SOLO
      nel cfg del core: viene usato per autorizzare la Lambda esportatrice di
      confinfo a scrivere nel bucket centrale. In confinfo lasciare vuoto.

  AnalyzerName:
    Type: String
    Default: pn-unused-access-analyzer
    Description: Nome del IAM Access Analyzer locale (tipo ACCOUNT_UNUSED_ACCESS).

  TrackingPeriodDays:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 365
    Description: Soglia (giorni) per considerare un permesso "inutilizzato". Range 1..365 imposto da AWS.

  ScheduleExpression:
    Type: String
    Default: rate(30 days)
    Description: Espressione di schedule EventBridge per la Lambda esportatrice.

  CentralReportsBucketKmsKeyArn:
    Type: String
    Default: ''
    Description: >-
      (Solo confinfo) ARN della CMK che cifra il bucket centrale del core.
      Necessario perche' la Lambda di confinfo possa fare kms:GenerateDataKey
      durante l'upload. Si recupera dall'output del deploy core.

  LogRetentionDays:
    Type: Number
    Default: 365
    Description: Retention dei log CloudWatch della Lambda esportatrice.

Conditions:

  # Stessa logica di pn-data-monitoring.yaml:
  #   - PnCoreAwsAccountId vuoto  -> stiamo eseguendo nel CORE
  #   - PnCoreAwsAccountId valorizzato -> stiamo eseguendo nel CONFINFO
  IsConfinfoAccount: !Not [ !Equals [ !Ref PnCoreAwsAccountId, '' ] ]
  IsCoreAccount:    !Equals [ !Ref PnCoreAwsAccountId, '' ]

  # Vero solo quando siamo nel core E sappiamo l'account id del confinfo da
  # autorizzare. Se non lo sappiamo ancora (primo bootstrap), il bucket si
  # crea lo stesso ma la statement cross-account non viene aggiunta.
  HasConfinfoAccountId: !And
    - !Condition IsCoreAccount
    - !Not [ !Equals [ !Ref PnConfinfoAwsAccountId, '' ] ]

Resources:

  # ===========================================================================
  # IAM Access Analyzer (creato in OGNI account, sia core che confinfo)
  # ---------------------------------------------------------------------------
  # WEAKNESS #1 (costo):
  #   ACCOUNT_UNUSED_ACCESS e' tariffato per ruolo IAM analizzato
  #   (~0.20 USD/role/mese). Su un'org grande non e' trascurabile. Verificare
  #   il numero di ruoli prima del rollout.
  # WEAKNESS #2 (segregazione):
  #   Usiamo volutamente ACCOUNT_* (NON ORGANIZATION_UNUSED_ACCESS) per
  #   mantenere ogni env autosufficiente ed evitare contaminazione cross-env
  #   dei findings.
  # ===========================================================================
  UnusedAccessAnalyzer:
    Type: AWS::AccessAnalyzer::Analyzer
    Properties:
      AnalyzerName: !Sub '${AnalyzerName}-${EnvironmentType}'
      Type: ACCOUNT_UNUSED_ACCESS
      AnalyzerConfiguration:
        UnusedAccessConfiguration:
          UnusedAccessAge: !Ref TrackingPeriodDays
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }
        - { Key: ManagedBy,       Value: CloudFormation }

  # ===========================================================================
  # SOLO CORE: KMS CMK per il bucket centrale dei report
  # ---------------------------------------------------------------------------
  # WEAKNESS #3 (rotazione):
  #   EnableKeyRotation = true. Se in futuro si passa a multi-region key,
  #   rivedere i permessi a valle (Athena/QuickSight).
  # WEAKNESS #4 (scope key policy):
  #   Concediamo kms:Encrypt/GenerateDataKey* al root del confinfo, ristretti
  #   da una condition sul nome del ruolo (prefisso esportatore). Sarebbe
  #   piu' stretto specificare l'ARN esatto del ruolo, ma genera dipendenza
  #   chicken-and-egg tra il deploy del core e la creazione del ruolo nel
  #   confinfo. Da rivisitare quando lo stack e' stabile.
  # ===========================================================================
  ReportsBucketKmsKey:
    Type: AWS::KMS::Key
    Condition: IsCoreAccount
    Properties:
      Description: !Sub 'CMK per i report di ${ProjectName}-iam-unused-access (${EnvironmentType})'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRoot
            Effect: Allow
            Principal: { AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root' }
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowCoreLambdaEncrypt
            Effect: Allow
            Principal: { AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root' }
            Action:
              - kms:Encrypt
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringLike:
                aws:PrincipalArn:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
          - !If
            - HasConfinfoAccountId
            - Sid: AllowConfinfoLambdaEncrypt
              Effect: Allow
              Principal: { AWS: !Sub 'arn:${AWS::Partition}:iam::${PnConfinfoAwsAccountId}:root' }
              Action:
                - kms:Encrypt
                - kms:GenerateDataKey*
                - kms:DescribeKey
              Resource: '*'
              Condition:
                StringLike:
                  aws:PrincipalArn:
                    - !Sub 'arn:${AWS::Partition}:iam::${PnConfinfoAwsAccountId}:role/${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
            - !Ref AWS::NoValue
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }

  ReportsBucketKmsKeyAlias:
    Type: AWS::KMS::Alias
    Condition: IsCoreAccount
    Properties:
      AliasName: !Sub 'alias/${ProjectName}-iam-unused-access-${EnvironmentType}'
      TargetKeyId: !Ref ReportsBucketKmsKey

  # ===========================================================================
  # SOLO CORE: bucket S3 centrale per i CSV (core + confinfo della stessa env)
  # ---------------------------------------------------------------------------
  # WEAKNESS #5 (Object Lock):
  #   Questo bucket contiene evidence di compliance. NON abilitiamo Object
  #   Lock per non complicare il primo deploy, ma per produzione valutare
  #   Object Lock in modalita' COMPLIANCE con retention >= obblighi legali.
  # WEAKNESS #6 (lifecycle):
  #   I report > 365gg vengono cancellati. Audit/legal potrebbero richiedere
  #   retention piu' lunga (5-7 anni). Adattare per env.
  # WEAKNESS #7 (no replication):
  #   Single-region. Per DR delle evidence, aggiungere CRR su un secondo
  #   bucket/region.
  # WEAKNESS #8 (no access logging):
  #   Non abilitiamo S3 server access logging. Se la policy PN lo richiede,
  #   puntare al bucket logs di pn-infra via LoggingConfiguration.
  # ===========================================================================
  CentralReportsBucket:
    Type: AWS::S3::Bucket
    Condition: IsCoreAccount
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-iam-unused-access-reports-${EnvironmentType}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt ReportsBucketKmsKey.Arn
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: abort-incomplete-multipart
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: expire-old-reports
            Status: Enabled
            ExpirationInDays: 365
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }
        - { Key: Purpose,         Value: iam-unused-access-evidence }

  # ---------------------------------------------------------------------------
  # SOLO CORE: bucket policy
  # WEAKNESS #9 (trust cross-account):
  #   La PutObject cross-account viene concessa al ROOT del confinfo, ristretta
  #   da una condition sul nome del ruolo esportatore. Stesso compromesso
  #   chicken-and-egg gia' commentato in WEAKNESS #4. Stringere all'ARN esatto
  #   quando lo stack e' stabile.
  # WEAKNESS #10 (SecureTransport):
  #   La deny su HTTP (aws:SecureTransport=false) e' inclusa: verificare che
  #   non ci siano tool interni che ancora parlano in HTTP (non dovrebbero).
  # ---------------------------------------------------------------------------
  CentralReportsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: IsCoreAccount
    Properties:
      Bucket: !Ref CentralReportsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt CentralReportsBucket.Arn
              - !Sub '${CentralReportsBucket.Arn}/*'
            Condition:
              Bool: { 'aws:SecureTransport': 'false' }
          - Sid: DenyUnencryptedObjectUploads
            Effect: Deny
            Principal: '*'
            Action: 's3:PutObject'
            Resource: !Sub '${CentralReportsBucket.Arn}/*'
            Condition:
              StringNotEquals:
                's3:x-amz-server-side-encryption': 'aws:kms'
          - !If
            - HasConfinfoAccountId
            - Sid: AllowConfinfoExporterPutObject
              Effect: Allow
              Principal: { AWS: !Sub 'arn:${AWS::Partition}:iam::${PnConfinfoAwsAccountId}:root' }
              Action:
                - s3:PutObject
                - s3:AbortMultipartUpload
              Resource: !Sub '${CentralReportsBucket.Arn}/*'
              Condition:
                StringLike:
                  aws:PrincipalArn:
                    - !Sub 'arn:${AWS::Partition}:iam::${PnConfinfoAwsAccountId}:role/${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
                StringEquals:
                  's3:x-amz-server-side-encryption': 'aws:kms'
                  's3:x-amz-server-side-encryption-aws-kms-key-id': !GetAtt ReportsBucketKmsKey.Arn
            - !Ref AWS::NoValue
          - Sid: AllowCoreAccountReadFullList
            Effect: Allow
            Principal: { AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root' }
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
              - s3:ListBucket
            Resource:
              - !GetAtt CentralReportsBucket.Arn
              - !Sub '${CentralReportsBucket.Arn}/*'

  # ===========================================================================
  # IAM role per la Lambda esportatrice (creato sia in core che in confinfo)
  # ---------------------------------------------------------------------------
  # WEAKNESS #11 (wildcard):
  #   Le API access-analyzer:List*/Get* su findings non supportano resource
  #   level permissions: Resource:'*' e' imposto dal servizio. Stessa
  #   limitazione gia' segnalata nel Terraform originale (CKV_AWS_355 skip).
  # WEAKNESS #12 (no SCP guard):
  #   Lo stesso ruolo puo' essere abusato per enumerare IAM. Non c'e' SCP
  #   org-wide che blocchi mutazioni IAM da questo ruolo. Se PN ha una
  #   guardrail org-level, agganciarla a questo path/tag.
  # WEAKNESS #13 (log encryption):
  #   Il log group della Lambda non e' cifrato con CMK. I log contengono ARN
  #   e nomi di ruolo. Se considerati sensibili, agganciare una KMS key.
  # ===========================================================================
  ExporterLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-iam-unused-access-exporter-${EnvironmentType}:*'
        - PolicyName: access-analyzer-readonly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - access-analyzer:ListAnalyzers
                  - access-analyzer:GetAnalyzer
                  - access-analyzer:ListFindings
                  - access-analyzer:ListFindingsV2
                  - access-analyzer:GetFinding
                  - access-analyzer:GetFindingV2
                Resource: '*'
        - PolicyName: s3-write-reports
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:AbortMultipartUpload
                Resource:
                  # In core scrive nel bucket creato qui; in confinfo scrive nel
                  # bucket del core, il cui nome e' deterministico:
                  # pn-iam-unused-access-reports-<env>-<core_account_id>
                  !If
                    - IsCoreAccount
                    - !Sub '${CentralReportsBucket.Arn}/*'
                    - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-iam-unused-access-reports-${EnvironmentType}-${PnCoreAwsAccountId}/*'
        - PolicyName: kms-encrypt-reports
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kms:Encrypt
                  - kms:GenerateDataKey*
                  - kms:DescribeKey
                Resource:
                  !If
                    - IsCoreAccount
                    - !GetAtt ReportsBucketKmsKey.Arn
                    - !Ref CentralReportsBucketKmsKeyArn
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }

  ExporterLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      RetentionInDays: !Ref LogRetentionDays

  # ===========================================================================
  # Lambda esportatrice (codice inline)
  # ---------------------------------------------------------------------------
  # WEAKNESS #14 (inline code):
  #   Inline ZipFile va bene per la prima iterazione ma NON da' build
  #   riproducibili, signing, o DLQ in caso di errore di init. Da spostare
  #   ad artefatto S3 quando lo stack entra in pipeline.
  # WEAKNESS #15 (no DLQ):
  #   Non configuriamo DeadLetterConfig. EventBridge ha le sue retry, ma le
  #   eccezioni interne alla Lambda dopo le retry vengono perse.
  # WEAKNESS #16 (no per-finding alerting):
  #   Questa Lambda produce solo un CSV periodico. NON allerta sui NUOVI
  #   findings ad alta severity. Per il real-time, aggiungere una rule
  #   EventBridge su source 'aws.access-analyzer' detail-type
  #   'Access Analyzer Finding' -> SNS. Fuori scope per questa iterazione.
  # ===========================================================================
  ExporterLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt ExporterLambdaRole.Arn
      Timeout: 900
      MemorySize: 512
      ReservedConcurrentExecutions: 1
      Environment:
        Variables:
          ANALYZER_ARN: !GetAtt UnusedAccessAnalyzer.Arn
          REPORTS_BUCKET:
            !If
              - IsCoreAccount
              - !Ref CentralReportsBucket
              - !Sub '${ProjectName}-iam-unused-access-reports-${EnvironmentType}-${PnCoreAwsAccountId}'
          REPORTS_KMS_KEY_ID:
            !If
              - IsCoreAccount
              - !GetAtt ReportsBucketKmsKey.Arn
              - !Ref CentralReportsBucketKmsKeyArn
          ENV_NAME: !Ref EnvironmentType
          ACCOUNT_ROLE: !If [IsCoreAccount, 'core', 'confinfo']
      Code:
        ZipFile: |
          """
          IAM Access Analyzer - esportatore unused access (versione CFN inline).

          Per ogni pagina di ListFindingsV2 sull'Analyzer locale di tipo
          ACCOUNT_UNUSED_ACCESS, aggiunge righe a un CSV in memoria, poi
          carica il CSV su REPORTS_BUCKET nel path
          <env>/<core|confinfo>/<account_id>/<yyyy-mm-dd>/findings-HHMMSS.csv
          con SSE-KMS usando REPORTS_KMS_KEY_ID.

          Volutamente minimale: niente DynamoDB di state tracking, niente SNS,
          niente recommendations. Vedere WEAKNESS #14 per quando arricchire.
          """
          import csv
          import io
          import json
          import logging
          import os
          from datetime import datetime, timezone

          import boto3
          from botocore.config import Config

          log = logging.getLogger()
          log.setLevel(logging.INFO)

          ANALYZER_ARN  = os.environ["ANALYZER_ARN"]
          BUCKET        = os.environ["REPORTS_BUCKET"]
          KMS_KEY_ID    = os.environ["REPORTS_KMS_KEY_ID"]
          ENV_NAME      = os.environ["ENV_NAME"]
          ACCOUNT_ROLE  = os.environ["ACCOUNT_ROLE"]  # 'core' | 'confinfo'

          aa  = boto3.client("accessanalyzer", config=Config(retries={"max_attempts": 10, "mode": "adaptive"}))
          s3  = boto3.client("s3")
          sts = boto3.client("sts")

          CSV_HEADER = [
              "finding_id", "finding_type", "resource", "resource_type",
              "status", "created_at", "updated_at", "analyzed_at",
              "unused_action_count", "details_json"
          ]

          def _iter_findings():
              token = None
              while True:
                  kwargs = {"analyzerArn": ANALYZER_ARN, "maxResults": 100}
                  if token:
                      kwargs["nextToken"] = token
                  resp = aa.list_findings_v2(**kwargs)
                  for f in resp.get("findings", []):
                      yield f
                  token = resp.get("nextToken")
                  if not token:
                      return

          def lambda_handler(event, context):
              account_id = sts.get_caller_identity()["Account"]
              now = datetime.now(timezone.utc)
              key = f"{ENV_NAME}/{ACCOUNT_ROLE}/{account_id}/{now:%Y-%m-%d}/findings-{now:%H%M%S}.csv"

              buf = io.StringIO()
              writer = csv.writer(buf)
              writer.writerow(CSV_HEADER)

              count = 0
              for f in _iter_findings():
                  writer.writerow([
                      f.get("id"),
                      f.get("findingType"),
                      f.get("resource"),
                      f.get("resourceType"),
                      f.get("status"),
                      f.get("createdAt").isoformat() if f.get("createdAt") else "",
                      f.get("updatedAt").isoformat() if f.get("updatedAt") else "",
                      f.get("analyzedAt").isoformat() if f.get("analyzedAt") else "",
                      (f.get("findingDetails") or {}).get("unusedAction", {}).get("totalUnusedActionsCount", ""),
                      json.dumps(f, default=str, separators=(",", ":")),
                  ])
                  count += 1

              s3.put_object(
                  Bucket=BUCKET,
                  Key=key,
                  Body=buf.getvalue().encode("utf-8"),
                  ContentType="text/csv",
                  ServerSideEncryption="aws:kms",
                  SSEKMSKeyId=KMS_KEY_ID,
              )

              log.info(json.dumps({"msg": "export completed", "account_id": account_id,
                                   "account_role": ACCOUNT_ROLE, "env": ENV_NAME,
                                   "key": key, "rows": count}))
              return {"status": "ok", "rows": count, "key": key}
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }

  # ===========================================================================
  # Schedule EventBridge
  # ===========================================================================
  ExporterSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      Description: Esecuzione periodica della Lambda esportatrice IAM Access Analyzer
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: exporter
          Arn: !GetAtt ExporterLambda.Arn

  ExporterSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ExporterLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ExporterSchedule.Arn

  # ===========================================================================
  # SOLO CORE: dashboard CloudWatch
  # ---------------------------------------------------------------------------
  # La dashboard mostra invocazioni/errori della Lambda esportatrice del core e
  # un widget Logs Insights sul log group locale. Per vedere anche i log della
  # Lambda confinfo serve cross-account observability via OAM (vedi
  # pn-oam-monitoring). In alternativa, parsare i CSV dal bucket centrale.
  # WEAKNESS #17 (no metriche confinfo by default):
  #   Senza OAM, la dashboard mostra solo il core. La visualizzazione
  #   cross-account e' lasciata a un follow-up.
  # ===========================================================================
  CentralDashboard:
    Type: AWS::CloudWatch::Dashboard
    Condition: IsCoreAccount
    Properties:
      DashboardName: !Sub '${ProjectName}-iam-unused-access-${EnvironmentType}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text", "x": 0, "y": 0, "width": 24, "height": 2,
              "properties": {
                "markdown": "# IAM Unused Access - ${EnvironmentType}\n\n**Account core:** ${AWS::AccountId} | **Bucket:** ${CentralReportsBucket}\n\nI report sono scritti in `s3://${CentralReportsBucket}/<env>/<core|confinfo>/<account_id>/<data>/`."
              }
            },
            {
              "type": "metric", "x": 0, "y": 2, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda esportatrice - invocazioni / errori (core)",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${ExporterLambda}", { "stat": "Sum" } ],
                  [ ".",          "Errors",      ".",            ".",                 { "stat": "Sum" } ]
                ],
                "view": "timeSeries", "stacked": false, "period": 86400
              }
            },
            {
              "type": "log", "x": 12, "y": 2, "width": 12, "height": 6,
              "properties": {
                "title": "Ultime esecuzioni esportatore (core)",
                "region": "${AWS::Region}",
                "query": "SOURCE '${ExporterLambdaLogGroup}' | fields @timestamp, @message | filter @message like /export completed/ | sort @timestamp desc | limit 50",
                "view": "table"
              }
            }
          ]
        }

Outputs:

  AnalyzerArn:
    Description: ARN del IAM Access Analyzer locale
    Value: !GetAtt UnusedAccessAnalyzer.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AnalyzerArn'

  ExporterLambdaArn:
    Description: ARN della Lambda esportatrice
    Value: !GetAtt ExporterLambda.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ExporterLambdaArn'

  ExporterLambdaRoleArn:
    Description: ARN del ruolo della Lambda esportatrice
    Value: !GetAtt ExporterLambdaRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ExporterLambdaRoleArn'

  CentralReportsBucketName:
    Condition: IsCoreAccount
    Description: Nome del bucket centrale dei report (in confinfo non serve passarlo, viene derivato)
    Value: !Ref CentralReportsBucket
    Export:
      Name: !Sub '${AWS::StackName}-CentralReportsBucketName'

  CentralReportsBucketKmsKeyArn:
    Condition: IsCoreAccount
    Description: ARN della CMK del bucket centrale (passarlo al cfg confinfo come CentralReportsBucketKmsKeyArn)
    Value: !GetAtt ReportsBucketKmsKey.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CentralReportsBucketKmsKeyArn'

  CentralDashboardName:
    Condition: IsCoreAccount
    Description: Nome della dashboard CloudWatch
    Value: !Ref CentralDashboard
