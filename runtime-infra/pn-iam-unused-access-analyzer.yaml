AWSTemplateFormatVersion: 2010-09-09
Description: IAM Access Analyzer - Detects unused access using a local ACCOUNT_UNUSED_ACCESS analyzer. The Lambda exports results to CSV on S3, including microservice evidence from IAM tags (when available).

Parameters:

  ProjectName:
    Type: String
    Description: Project prefix
    Default: pn

  EnvironmentType:
    Type: String
    Description: Environment name (dev|test|uat|hotfix|prod).
    AllowedValues: [dev, test, uat, hotfix, prod]

  PnCoreAwsAccountId:
    Type: String
    Default: ''
    Description: Core account ID

  PnConfinfoAwsAccountId:
    Type: String
    Default: ''
    Description: Confinfo account ID

  AnalyzerName:
    Type: String
    Default: unused-access-analyzer
    Description: Name for the Access Analyzer resource

  TrackingPeriodDays:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 365
    Description: Threshold (in days) to consider a permission as unused. Valid range is 1..365 per AWS limits.

  ScheduleExpression:
    Type: String
    Default: cron(0 2 ? * MON *)
    Description: EventBridge schedule expression for the exporter Lambda.

  EnableExporterSchedule:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]
    Description: EventBridge exporter rule state.

  ResolveRoleTagsInExporter:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: If true, the exporter Lambda enriches the CSV with the IAM Microservice tag (microservice_tag column). If false, it sets microservice_tag=no-tag.

  LogRetentionDays:
    Type: Number
    Default: 365
    Description: CloudWatch log retention for the exporter Lambda.

  S3lifecyclepolicyReportInDays:
    Type: Number
    Default: 180
    Description: Retention period (in days) for exported reports in S3. Older reports will be automatically deleted by the S3 lifecycle configuration.

  LambdasBucketName:
    Type: String
    Description: S3 bucket name containing Lambda deployment packages

  LambdasBasePath:
    Type: String
    Description: S3 key prefix for Lambda deployment packages
    Default: ''

Conditions:
  IsCoreAccount:    !Equals [ !Ref PnCoreAwsAccountId, '' ]
  HasConfinfoAccountId: !And [ !Condition IsCoreAccount, !Not [ !Equals [ !Ref PnConfinfoAwsAccountId, '' ] ] ]

Resources:
  UnusedAccessAnalyzer:
    Type: AWS::AccessAnalyzer::Analyzer
    Properties:
      AnalyzerName: !Sub '${ProjectName}-${AnalyzerName}-${EnvironmentType}'
      Type: ACCOUNT_UNUSED_ACCESS
      AnalyzerConfiguration:
        UnusedAccessConfiguration:
          UnusedAccessAge: !Ref TrackingPeriodDays
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }

  LocalReportsBucket:
    Type: AWS::S3::Bucket
    Condition: IsCoreAccount
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-iam-unused-access-reports-${EnvironmentType}-${AWS::AccountId}'
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: GOVERNANCE
            Days: !Ref S3lifecyclepolicyReportInDays
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: abort-incomplete-multipart
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: expire-old-reports
            Status: Enabled
            ExpirationInDays: !Ref S3lifecyclepolicyReportInDays
            NoncurrentVersionExpiration:
              NoncurrentDays: !Ref S3lifecyclepolicyReportInDays
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }
        - { Key: Purpose,         Value: iam-unused-access-evidence }

  LocalReportsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: IsCoreAccount
    Properties:
      Bucket: !Ref LocalReportsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt LocalReportsBucket.Arn
              - !Sub '${LocalReportsBucket.Arn}/*'
            Condition:
              Bool: { 'aws:SecureTransport': 'false' }
          - !If
            - HasConfinfoAccountId
            - Sid: AllowConfinfoExporterPutObject
              Effect: Allow
              Principal: { AWS: !Sub 'arn:${AWS::Partition}:iam::${PnConfinfoAwsAccountId}:root' }
              Action:
                - s3:PutObject
                - s3:AbortMultipartUpload
              Resource: !Sub '${LocalReportsBucket.Arn}/*'
              Condition:
                StringLike:
                  aws:PrincipalArn:
                    - !Sub 'arn:${AWS::Partition}:iam::${PnConfinfoAwsAccountId}:role/${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
            - !Ref AWS::NoValue

  ExporterLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-iam-unused-access-exporter-${EnvironmentType}:*'
        - PolicyName: access-analyzer-readonly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - access-analyzer:ListAnalyzers
                  - access-analyzer:GetAnalyzer
                  - access-analyzer:ListFindings*
                  - access-analyzer:GetFinding*
                Resource: '*'
        - PolicyName: s3-write-reports
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:AbortMultipartUpload
                Resource: !If
                  - IsCoreAccount
                  - !Sub '${LocalReportsBucket.Arn}/*'
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-iam-unused-access-reports-${EnvironmentType}-${PnCoreAwsAccountId}/*'
        - PolicyName: iam-role-tags-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:ListRoleTags
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/*'
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }

  ExporterLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      RetentionInDays: !Ref LogRetentionDays

  ExporterLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt ExporterLambdaRole.Arn
      Timeout: 900
      MemorySize: 512
      ReservedConcurrentExecutions: 1
      Environment:
        Variables:
          ANALYZER_ARN: !GetAtt UnusedAccessAnalyzer.Arn
          REPORTS_BUCKET: !If
            - IsCoreAccount
            - !Ref LocalReportsBucket
            - !Sub '${ProjectName}-iam-unused-access-reports-${EnvironmentType}-${PnCoreAwsAccountId}'
          ENV_NAME: !Ref EnvironmentType
          ACCOUNT_ROLE: !If [IsCoreAccount, 'core', 'confinfo']
          RESOLVE_ROLE_TAGS: !Ref ResolveRoleTagsInExporter
      Code:
        S3Bucket: !Ref LambdasBucketName
        S3Key: !Sub ${LambdasBasePath}/iam-unused-access-exporter.zip
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }

  ExporterSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      Description: Periodic execution rule for the IAM Access Analyzer exporter Lambda
      ScheduleExpression: !Ref ScheduleExpression
      State: !Ref EnableExporterSchedule
      Targets:
        - Id: exporter
          Arn: !GetAtt ExporterLambda.Arn

  ExporterSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ExporterLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ExporterSchedule.Arn

  CoreResultsWidgetRole:
    Type: AWS::IAM::Role
    Condition: IsCoreAccount
    Properties:
      RoleName: !Sub '${ProjectName}-iam-unused-access-core-widget-${EnvironmentType}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-iam-unused-access-core-widget-${EnvironmentType}:*'
        - PolicyName: read-core-reports
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt LocalReportsBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub '${LocalReportsBucket.Arn}/*'

  CoreResultsWidgetLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: IsCoreAccount
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-iam-unused-access-core-widget-${EnvironmentType}'
      RetentionInDays: !Ref LogRetentionDays

  CoreResultsWidget:
    Type: AWS::Lambda::Function
    Condition: IsCoreAccount
    Properties:
      FunctionName: !Sub '${ProjectName}-iam-unused-access-core-widget-${EnvironmentType}'
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt CoreResultsWidgetRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          DEFAULT_BUCKET: !Ref LocalReportsBucket
          DEFAULT_PREFIX: !Sub '${EnvironmentType}/core/'
      Code:
        S3Bucket: !Ref LambdasBucketName
        S3Key: !Sub ${LambdasBasePath}/iam-unused-access-core-widget.zip

  CoreResultsWidgetInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: IsCoreAccount
    Properties:
      FunctionName: !Ref CoreResultsWidget
      Action: lambda:InvokeFunction
      Principal: cloudwatch.amazonaws.com

  CoreDashboard:
    Type: AWS::CloudWatch::Dashboard
    Condition: IsCoreAccount
    Properties:
      DashboardName: !Sub '${ProjectName}-iam-unused-access-${EnvironmentType}'
      DashboardBody: !Sub |
            {
              "start": "-P7D",
              "periodOverride": "inherit",
              "widgets": [
                {
                  "type": "text", "x": 0, "y": 0, "width": 24, "height": 2,
                  "properties": {
                    "markdown": "# IAM Unused Access - ${EnvironmentType}\n\n**Account core:** ${AWS::AccountId} | **Bucket centrale:** ${LocalReportsBucket}\n\nCore e confinfo scrivono entrambi nel bucket centrale del core. In basso vedi i report piu' recenti per core e confinfo."
                  }
                },
                {
                  "type": "custom", "x": 0, "y": 2, "width": 12, "height": 8,
                  "properties": {
                    "title": "Core - ruoli inutilizzati vs permessi inutilizzati",
                    "endpoint": "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-iam-unused-access-core-widget-${EnvironmentType}",
                    "params": {
                      "view": "summary",
                      "label": "core",
                      "bucket": "${LocalReportsBucket}",
                      "prefix": "${EnvironmentType}/core/"
                    }
                  }
                },
                {
                  "type": "custom", "x": 12, "y": 2, "width": 12, "height": 8,
                  "properties": {
                    "title": "Core - finding per microservizio",
                    "endpoint": "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-iam-unused-access-core-widget-${EnvironmentType}",
                    "params": {
                      "view": "microservice",
                      "microserviceLimit": 8,
                      "label": "core",
                      "bucket": "${LocalReportsBucket}",
                      "prefix": "${EnvironmentType}/core/"
                    }
                  }
                },
                {
                  "type": "custom", "x": 0, "y": 10, "width": 12, "height": 8,
                  "properties": {
                    "title": "Confinfo - ruoli inutilizzati vs permessi inutilizzati",
                    "endpoint": "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-iam-unused-access-core-widget-${EnvironmentType}",
                    "params": {
                      "view": "summary",
                      "label": "confinfo",
                      "bucket": "${LocalReportsBucket}",
                      "prefix": "${EnvironmentType}/confinfo/"
                    }
                  }
                },
                {
                  "type": "custom", "x": 12, "y": 10, "width": 12, "height": 8,
                  "properties": {
                    "title": "Confinfo - finding per microservizio",
                    "endpoint": "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-iam-unused-access-core-widget-${EnvironmentType}",
                    "params": {
                      "view": "microservice",
                      "microserviceLimit": 8,
                      "label": "confinfo",
                      "bucket": "${LocalReportsBucket}",
                      "prefix": "${EnvironmentType}/confinfo/"
                    }
                  }
                },
                {
                  "type": "custom", "x": 0, "y": 18, "width": 24, "height": 8,
                  "properties": {
                    "title": "Ultimi finding core",
                    "endpoint": "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-iam-unused-access-core-widget-${EnvironmentType}",
                    "params": {
                      "label": "core",
                      "bucket": "${LocalReportsBucket}",
                      "prefix": "${EnvironmentType}/core/"
                    }
                  }
                },
                {
                  "type": "custom", "x": 0, "y": 26, "width": 24, "height": 8,
                  "properties": {
                    "title": "Ultimi finding confinfo",
                    "endpoint": "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-iam-unused-access-core-widget-${EnvironmentType}",
                    "params": {
                      "label": "confinfo",
                      "bucket": "${LocalReportsBucket}",
                      "prefix": "${EnvironmentType}/confinfo/"
                    }
                  }
                },
                {
                  "type": "metric", "x": 0, "y": 34, "width": 12, "height": 6,
                  "properties": {
                    "title": "Lambda esportatrice - invocazioni / errori (core)",
                    "region": "${AWS::Region}",
                    "metrics": [
                      [ "AWS/Lambda", "Invocations", "FunctionName", "${ExporterLambda}", { "stat": "Sum" } ],
                      [ ".",          "Errors",      ".",            ".",                 { "stat": "Sum" } ]
                    ],
                    "view": "timeSeries", "stacked": false, "period": 86400
                  }
                },
                {
                  "type": "log", "x": 12, "y": 34, "width": 12, "height": 6,
                  "properties": {
                    "title": "Ultime esecuzioni esportatore (core)",
                    "region": "${AWS::Region}",
                    "query": "SOURCE '${ExporterLambdaLogGroup}' | fields @timestamp, @message | filter @message like /export completed/ | sort @timestamp desc | limit 50",
                    "view": "table"
                  }
                }
              ]
            }

Outputs:

  AnalyzerArn:
    Description: ARN of the local IAM Access Analyzer
    Value: !GetAtt UnusedAccessAnalyzer.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AnalyzerArn'

  ExporterLambdaArn:
    Description: ARN of the exporter Lambda
    Value: !GetAtt ExporterLambda.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ExporterLambdaArn'

  ExporterLambdaRoleArn:
    Description: ARN of the exporter Lambda role
    Value: !GetAtt ExporterLambdaRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ExporterLambdaRoleArn'

  LocalReportsBucketName:
    Condition: IsCoreAccount
    Description: Name of the local reports bucket for the current account
    Value: !Ref LocalReportsBucket
    Export:
      Name: !Sub '${AWS::StackName}-LocalReportsBucketName'

  CoreDashboardName:
    Condition: IsCoreAccount
    Description: Name of the CloudWatch dashboard
    Value: !Ref CoreDashboard
