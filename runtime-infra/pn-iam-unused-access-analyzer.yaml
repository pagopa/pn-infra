AWSTemplateFormatVersion: 2010-09-09
Description: >-
  IAM Access Analyzer - rilevamento accessi inutilizzati (hub-and-spoke per env).
  Stesso template usato sia in core che in confinfo: la discriminante e' il
  parametro PnCoreAwsAccountId (vuoto = stiamo girando nel core, valorizzato =
  stiamo girando in confinfo). Stesso pattern di pn-data-monitoring.yaml.
  - In core: si crea il bucket S3 locale dei report, la dashboard CloudWatch
    e l'Analyzer + Lambda esportatrice del core stesso.
  - In confinfo: si crea il bucket S3 locale, l'Analyzer + Lambda esportatrice
    e una bucket policy che consente al core della stessa env di leggere i
    report per consultazione centralizzata.

Parameters:

  ProjectName:
    Type: String
    Description: Prefisso di progetto (es. pn). Allineato agli altri template pn-infra.
    Default: pn

  EnvironmentType:
    Type: String
    Description: Nome ambiente (dev|uat|hotfix|prod).
    AllowedValues: [dev, uat, hotfix, prod]
    # to remove
    Default: dev 

  PnCoreAwsAccountId:
    Type: String
    Default: ''
    Description: Core Account

  PnConfinfoAwsAccountId:
    Type: String
    Default: ''
    Description: >-
      Account ID del confinfo della stessa env. Serve nel deploy core per
      costruire il nome del bucket remoto di confinfo e mostrarne i risultati
      nella dashboard centralizzata.

  AnalyzerName:
    Type: String
    Default: pn-unused-access-analyzer
    Description: Nome del IAM Access Analyzer locale (tipo ACCOUNT_UNUSED_ACCESS).

  TrackingPeriodDays:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 365
    Description: Soglia (giorni) per considerare un permesso "inutilizzato". Range 1..365 imposto da AWS.

  ScheduleExpression:
    Type: String
    Default: rate(30 days)
    Description: Espressione di schedule EventBridge per la Lambda esportatrice.

  LogRetentionDays:
    Type: Number
    Default: 365
    Description: Retention dei log CloudWatch della Lambda esportatrice.

Conditions:
  IsConfinfoAccount: !Not [ !Equals [ !Ref PnCoreAwsAccountId, '' ] ]
  IsCoreAccount:    !Equals [ !Ref PnCoreAwsAccountId, '' ]
  HasConfinfoAccountId: !And [ !Condition IsCoreAccount, !Not [ !Equals [ !Ref PnConfinfoAwsAccountId, '' ] ] ]

Resources:
  UnusedAccessAnalyzer:
    Type: AWS::AccessAnalyzer::Analyzer
    Properties:
      AnalyzerName: !Sub '${AnalyzerName}-${EnvironmentType}'
      Type: ACCOUNT_UNUSED_ACCESS
      AnalyzerConfiguration:
        UnusedAccessConfiguration:
          UnusedAccessAge: !Ref TrackingPeriodDays
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }

  LocalReportsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-iam-unused-access-reports-${EnvironmentType}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: abort-incomplete-multipart
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: expire-old-reports
            Status: Enabled
            ExpirationInDays: 365
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }
        - { Key: Purpose,         Value: iam-unused-access-evidence }

  LocalReportsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LocalReportsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt LocalReportsBucket.Arn
              - !Sub '${LocalReportsBucket.Arn}/*'
            Condition:
              Bool: { 'aws:SecureTransport': 'false' }
          - !If
            - IsConfinfoAccount
            - Sid: AllowCoreReadFromConfinfoBucket
              Effect: Allow
              Principal: { AWS: !Sub 'arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:root' }
              Action:
                - s3:GetObject
                - s3:GetObjectVersion
                - s3:ListBucket
              Resource:
                - !GetAtt LocalReportsBucket.Arn
                - !Sub '${LocalReportsBucket.Arn}/*'
              Condition:
                StringLike:
                  aws:PrincipalArn:
                    - !Sub 'arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:role/*'
                    - !Sub 'arn:${AWS::Partition}:iam::${PnCoreAwsAccountId}:root'
            - !Ref AWS::NoValue

  ExporterLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-iam-unused-access-exporter-${EnvironmentType}:*'
        - PolicyName: access-analyzer-readonly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - access-analyzer:ListAnalyzers
                  - access-analyzer:GetAnalyzer
                  - access-analyzer:ListFindings*
                  - access-analyzer:GetFinding*
                Resource: '*'
        - PolicyName: s3-write-reports
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:AbortMultipartUpload
                Resource: !Sub '${LocalReportsBucket.Arn}/*'
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }

  ExporterLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      RetentionInDays: !Ref LogRetentionDays

  ExporterLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt ExporterLambdaRole.Arn
      Timeout: 900
      MemorySize: 512
      ReservedConcurrentExecutions: 1
      Environment:
        Variables:
          ANALYZER_ARN: !GetAtt UnusedAccessAnalyzer.Arn
          REPORTS_BUCKET: !Ref LocalReportsBucket
          ENV_NAME: !Ref EnvironmentType
          ACCOUNT_ROLE: !If [IsCoreAccount, 'core', 'confinfo']
      Code:
        ZipFile: |
          """
          IAM Access Analyzer - esportatore unused access (versione CFN inline).

          Per ogni pagina di ListFindingsV2 sull'Analyzer locale di tipo
          ACCOUNT_UNUSED_ACCESS, aggiunge righe a un CSV in memoria, poi
          carica il CSV su REPORTS_BUCKET nel path
          <env>/<core|confinfo>/<account_id>/<yyyy-mm-dd>/findings-HHMMSS.csv
          lasciando a S3 la cifratura server-side di default (SSE-S3).

          Volutamente minimale: niente DynamoDB di state tracking, niente SNS,
          niente recommendations. Vedere WEAKNESS #14 per quando arricchire.
          """
          import csv
          import io
          import json
          import logging
          import os
          from datetime import datetime, timezone

          import boto3
          from botocore.config import Config

          log = logging.getLogger()
          log.setLevel(logging.INFO)

          ANALYZER_ARN  = os.environ["ANALYZER_ARN"]
          BUCKET        = os.environ["REPORTS_BUCKET"]
          ENV_NAME      = os.environ["ENV_NAME"]
          ACCOUNT_ROLE  = os.environ["ACCOUNT_ROLE"]  # 'core' | 'confinfo'

          aa  = boto3.client("accessanalyzer", config=Config(retries={"max_attempts": 10, "mode": "adaptive"}))
          s3  = boto3.client("s3")
          sts = boto3.client("sts")

          CSV_HEADER = [
              "finding_id", "finding_type", "resource", "resource_type",
              "status", "created_at", "updated_at", "analyzed_at",
              "unused_action_count", "details_json"
          ]

          def _iter_findings():
              token = None
              while True:
                  kwargs = {"analyzerArn": ANALYZER_ARN, "maxResults": 100}
                  if token:
                      kwargs["nextToken"] = token
                  resp = aa.list_findings_v2(**kwargs)
                  for f in resp.get("findings", []):
                      yield f
                  token = resp.get("nextToken")
                  if not token:
                      return

          def lambda_handler(event, context):
              account_id = sts.get_caller_identity()["Account"]
              now = datetime.now(timezone.utc)
              key = f"{ENV_NAME}/{ACCOUNT_ROLE}/{account_id}/{now:%Y-%m-%d}/findings-{now:%H%M%S}.csv"

              buf = io.StringIO()
              writer = csv.writer(buf)
              writer.writerow(CSV_HEADER)

              count = 0
              for f in _iter_findings():
                  writer.writerow([
                      f.get("id"),
                      f.get("findingType"),
                      f.get("resource"),
                      f.get("resourceType"),
                      f.get("status"),
                      f.get("createdAt").isoformat() if f.get("createdAt") else "",
                      f.get("updatedAt").isoformat() if f.get("updatedAt") else "",
                      f.get("analyzedAt").isoformat() if f.get("analyzedAt") else "",
                      (f.get("findingDetails") or {}).get("unusedAction", {}).get("totalUnusedActionsCount", ""),
                      json.dumps(f, default=str, separators=(",", ":")),
                  ])
                  count += 1

              s3.put_object(
                  Bucket=BUCKET,
                  Key=key,
                  Body=buf.getvalue().encode("utf-8"),
                  ContentType="text/csv",
              )

              log.info(json.dumps({"msg": "export completed", "account_id": account_id,
                                   "account_role": ACCOUNT_ROLE, "env": ENV_NAME,
                                   "key": key, "rows": count}))
              return {"status": "ok", "rows": count, "key": key}
      Tags:
        - { Key: ProjectName,     Value: !Ref ProjectName }
        - { Key: EnvironmentType, Value: !Ref EnvironmentType }

  ExporterSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectName}-iam-unused-access-exporter-${EnvironmentType}'
      Description: Esecuzione periodica della Lambda esportatrice IAM Access Analyzer
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: exporter
          Arn: !GetAtt ExporterLambda.Arn

  ExporterSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ExporterLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ExporterSchedule.Arn

  ConfinfoResultsWidgetRole:
    Type: AWS::IAM::Role
    Condition: HasConfinfoAccountId
    Properties:
      RoleName: !Sub '${ProjectName}-iam-unused-access-confinfo-widget-${EnvironmentType}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-iam-unused-access-confinfo-widget-${EnvironmentType}:*'
        - PolicyName: read-confinfo-reports
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-iam-unused-access-reports-${EnvironmentType}-${PnConfinfoAwsAccountId}'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-iam-unused-access-reports-${EnvironmentType}-${PnConfinfoAwsAccountId}/*'

  ConfinfoResultsWidgetLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasConfinfoAccountId
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-iam-unused-access-confinfo-widget-${EnvironmentType}'
      RetentionInDays: !Ref LogRetentionDays

  ConfinfoResultsWidget:
    Type: AWS::Lambda::Function
    Condition: HasConfinfoAccountId
    Properties:
      FunctionName: !Sub '${ProjectName}-iam-unused-access-confinfo-widget-${EnvironmentType}'
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt ConfinfoResultsWidgetRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          CONFINFO_BUCKET: !Sub '${ProjectName}-iam-unused-access-reports-${EnvironmentType}-${PnConfinfoAwsAccountId}'
          CONFINFO_PREFIX: !Sub '${EnvironmentType}/confinfo/'
      Code:
        ZipFile: |
          import csv
          import html
          import io
          import os

          import boto3

          s3 = boto3.client("s3")

          def _describe():
              return {
                  "markdown": "Confinfo latest findings widget. Mostra il CSV piu' recente scritto nel bucket confinfo e visualizza le prime 20 righe utili."
              }

          def _render_message(message):
              return f'<div class="cwdb-no-default-styles"></div><p>{html.escape(message)}</p>'

          def handler(event, context):
              if event.get("describe"):
                  return _describe()

              bucket = os.environ.get("CONFINFO_BUCKET", "")
              prefix = os.environ.get("CONFINFO_PREFIX", "")
              if not bucket:
                  return _render_message("Bucket confinfo non configurato")

              response = s3.list_objects_v2(Bucket=bucket, Prefix=prefix, MaxKeys=200)
              objects = response.get("Contents", [])
              csv_objects = [obj for obj in objects if obj["Key"].endswith(".csv")]
              if not csv_objects:
                  return _render_message(f"Nessun report CSV trovato in s3://{bucket}/{prefix}")

              latest = max(csv_objects, key=lambda obj: obj["LastModified"])
              obj = s3.get_object(Bucket=bucket, Key=latest["Key"])
              body = obj["Body"].read().decode("utf-8")
              reader = csv.DictReader(io.StringIO(body))

              rows = []
              for idx, row in enumerate(reader):
                  if idx >= 20:
                      break
                  rows.append(
                      "<tr>"
                      f"<td>{html.escape(row.get('finding_id', ''))}</td>"
                      f"<td>{html.escape(row.get('resource', ''))}</td>"
                      f"<td>{html.escape(row.get('status', ''))}</td>"
                      f"<td>{html.escape(str(row.get('unused_action_count', '')))}</td>"
                      "</tr>"
                  )

              header = (
                  '<div class="cwdb-no-default-styles"></div>'
                  '<style>'
                  'table{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:12px}'
                  'th,td{padding:6px;border-bottom:1px solid #ddd;text-align:left;white-space:nowrap}'
                  'th{background:#eef3f7}'
                  '</style>'
                  f'<p><b>Bucket:</b> {html.escape(bucket)}<br/>'
                  f'<b>Ultimo report:</b> {html.escape(latest["Key"])}<br/>'
                  f'<b>Ultima modifica:</b> {latest["LastModified"].isoformat()}</p>'
              )

              if not rows:
                  return header + '<p>Nessun finding nel report piu\' recente.</p>'

              table = (
                  '<table><thead><tr><th>Finding</th><th>Resource</th><th>Status</th><th>Unused Actions</th></tr></thead>'
                  f'<tbody>{"".join(rows)}</tbody></table>'
              )
              return header + table

  ConfinfoResultsWidgetInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: HasConfinfoAccountId
    Properties:
      FunctionName: !Ref ConfinfoResultsWidget
      Action: lambda:InvokeFunction
      Principal: cloudwatch.amazonaws.com

  CoreDashboard:
    Type: AWS::CloudWatch::Dashboard
    Condition: IsCoreAccount
    Properties:
      DashboardName: !Sub '${ProjectName}-iam-unused-access-${EnvironmentType}'
      DashboardBody: !If
        - HasConfinfoAccountId
        - !Sub |
            {
              "widgets": [
                {
                  "type": "text", "x": 0, "y": 0, "width": 24, "height": 2,
                  "properties": {
                    "markdown": "# IAM Unused Access - ${EnvironmentType}\n\n**Account core:** ${AWS::AccountId} | **Bucket locale core:** ${LocalReportsBucket}\n\nOgni account scrive nel proprio bucket locale. In basso vedi il report piu' recente letto dal bucket di confinfo."
                  }
                },
                {
                  "type": "metric", "x": 0, "y": 2, "width": 12, "height": 6,
                  "properties": {
                    "title": "Lambda esportatrice - invocazioni / errori (core)",
                    "region": "${AWS::Region}",
                    "metrics": [
                      [ "AWS/Lambda", "Invocations", "FunctionName", "${ExporterLambda}", { "stat": "Sum" } ],
                      [ ".",          "Errors",      ".",            ".",                 { "stat": "Sum" } ]
                    ],
                    "view": "timeSeries", "stacked": false, "period": 86400
                  }
                },
                {
                  "type": "log", "x": 12, "y": 2, "width": 12, "height": 6,
                  "properties": {
                    "title": "Ultime esecuzioni esportatore (core)",
                    "region": "${AWS::Region}",
                    "query": "SOURCE '${ExporterLambdaLogGroup}' | fields @timestamp, @message | filter @message like /export completed/ | sort @timestamp desc | limit 50",
                    "view": "table"
                  }
                },
                {
                  "type": "custom", "x": 0, "y": 8, "width": 24, "height": 8,
                  "properties": {
                    "title": "Ultimi finding confinfo",
                    "endpoint": "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-iam-unused-access-confinfo-widget-${EnvironmentType}"
                  }
                }
              ]
            }
        - !Sub |
            {
              "widgets": [
                {
                  "type": "text", "x": 0, "y": 0, "width": 24, "height": 2,
                  "properties": {
                    "markdown": "# IAM Unused Access - ${EnvironmentType}\n\n**Account core:** ${AWS::AccountId} | **Bucket locale core:** ${LocalReportsBucket}\n\nDashboard core attiva. Per vedere anche i risultati di confinfo valorizza PnConfinfoAwsAccountId nel deploy core."
                  }
                },
                {
                  "type": "metric", "x": 0, "y": 2, "width": 12, "height": 6,
                  "properties": {
                    "title": "Lambda esportatrice - invocazioni / errori (core)",
                    "region": "${AWS::Region}",
                    "metrics": [
                      [ "AWS/Lambda", "Invocations", "FunctionName", "${ExporterLambda}", { "stat": "Sum" } ],
                      [ ".",          "Errors",      ".",            ".",                 { "stat": "Sum" } ]
                    ],
                    "view": "timeSeries", "stacked": false, "period": 86400
                  }
                },
                {
                  "type": "log", "x": 12, "y": 2, "width": 12, "height": 6,
                  "properties": {
                    "title": "Ultime esecuzioni esportatore (core)",
                    "region": "${AWS::Region}",
                    "query": "SOURCE '${ExporterLambdaLogGroup}' | fields @timestamp, @message | filter @message like /export completed/ | sort @timestamp desc | limit 50",
                    "view": "table"
                  }
                }
              ]
            }

Outputs:

  AnalyzerArn:
    Description: ARN del IAM Access Analyzer locale
    Value: !GetAtt UnusedAccessAnalyzer.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AnalyzerArn'

  ExporterLambdaArn:
    Description: ARN della Lambda esportatrice
    Value: !GetAtt ExporterLambda.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ExporterLambdaArn'

  ExporterLambdaRoleArn:
    Description: ARN del ruolo della Lambda esportatrice
    Value: !GetAtt ExporterLambdaRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ExporterLambdaRoleArn'

  LocalReportsBucketName:
    Description: Nome del bucket locale dei report dell'account corrente
    Value: !Ref LocalReportsBucket
    Export:
      Name: !Sub '${AWS::StackName}-LocalReportsBucketName'

  CoreDashboardName:
    Condition: IsCoreAccount
    Description: Nome della dashboard CloudWatch
    Value: !Ref CoreDashboard
