AWSTemplateFormatVersion: 2010-09-09
Description: 'Deploy advanced monitoring with cross-account EventBridge delivery'

Parameters:
  ProjectName:
    Type: String
    Description: 'Project prefix for resources (e.g., pnXYZ)'

  PnCoreAwsAccountId:
    Type: String
    Description: 'Core Account ID (leave blank in Core account)'
    Default: ''

  InfraSecTrailName:
    Type: String
    Default: 'infra-sec-monitoring-cloudtrail'
    Description: 'CloudTrail name'

  TemplateBucketBaseUrl:
    Type: String
    Description: 'S3 bucket URL for templates'

  Version:
    Type: String
    Description: 'Template version'

  EnableCloudTrailLogs:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: 'Enable CloudTrail logs?'

  LogsBucketName:
    Type: String
    Description: 'Bucket for CloudTrail logs'

  MultiRegionTrail:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: 'Multi-region CloudTrail?'

  LogRetentionDays:
    Type: Number
    Default: 365
    Description: 'CloudWatch Logs retention (0=infinite)'

  MonitorS3:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: 'Monitor S3 bucket deletion events?'

  PITRExcludedTables:
    Type: CommaDelimitedList
    Description: 'DynamoDB tables to exclude from PITR disabled alerts'
    Default: ''

  CdcKinesisStreamArn:
    Type: String
    Description: 'ARN of Kinesis CDC stream'

  CdcKinesisStreamKeyArn:
    Type: String
    Description: 'ARN of KMS key for decrypting CDC stream (if encrypted)'

  CriticalAlarmSNSTopicArn:
    Type: String
    Description: 'ARN of SNS topic for critical alerts'

  CriticalDynamoDBTables:
    Type: CommaDelimitedList
    Description: Lista delle tabelle DynamoDB critiche da monitorare

  CriticalS3Prefixes:
    Type: CommaDelimitedList
    Description: Prefissi S3 critici da monitorare

  EnvironmentType:
    Type: String
    Description: 'Deployment environment (e.g., dev, prod)'

  DynamoAlertLambdaTableConfig:
    Type: String
    Default: '{}'
    Description: 'JSON map tableName->policy (no-delete|append-only|standard) for CDC validation'

  CloudtrailEventDataStoreEnabled:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: 'If Cloudtrail Event Data Store is enabled'

  LambdasBucketName:
    Type: String
    Description: S3 bucket name containing Lambda deployment packages

  LambdasBasePath:
    Type: String
    Description: S3 key prefix for Lambda deployment packages
    Default: ''

  DynamoDBAccessValidatorTables:
    Type: CommaDelimitedList
    Description: 'DynamoDB tables to monitor for access patterns (requires CloudTrail Event Data Store)'

  AlarmSNSTopicName:
    Type: String
    Description: 'Name of SNS topic for alarms'

  LambdaReservedConcurrency:
    Type: Number
    Default: 10
    Description: 'Reserved concurrency for Lambda functions'

  ExpectedCsvHash:
    Type: String
    Description: 'Expected hash of the authorized_roles.csv file for integrity validation'

  AlertOnCrossAccountAccess:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: 'Whether to alert on cross-account access events'

  AllowedAccountIds:
    Type: CommaDelimitedList
    Description: 'List of allowed account IDs for cross-account access (if AlertOnCrossAccountAccess is true)'
    Default: ''

Conditions:
  HasCloudTrailLogsEnabled: !Equals [!Ref EnableCloudTrailLogs, 'true']
  MonitorS3Condition: !Equals [!Ref MonitorS3, 'true']
  IsMultiRegionTrailCondition: !Equals [!Ref MultiRegionTrail, 'true']
  IsConfinfoAccount: !Not [ !Equals [!Ref PnCoreAwsAccountId, '' ] ]
  IsCoreAccount: !Equals [!Ref PnCoreAwsAccountId, '' ]
  HasCloudTrailLogsEnabledAndIsConfinfoAccount: !And [ !Equals [!Ref EnableCloudTrailLogs, 'true'], !Condition IsConfinfoAccount ]
  HasCloudTrailLogsEnabledAndIsCoreAccount: !And [ !Equals [!Ref EnableCloudTrailLogs, 'true'], !Condition IsCoreAccount ]
  HasS3CriticalPrefixMonitoring: !Not [ !Equals [ !Join  [",", !Ref CriticalS3Prefixes], "" ] ]
  HasDynamoDBCriticalTableMonitoring: !Not [ !Equals [ !Join  [",", !Ref CriticalDynamoDBTables], "" ] ]
  HasCloudtrailEventDataStoreEnabledAndIsConfinfoAccount: !And [ !Equals [!Ref CloudtrailEventDataStoreEnabled, 'true'], !Condition IsConfinfoAccount ]
  HasDynamoDBAccessValidatorTables: !Not [ !Equals [ !Join  [",", !Ref DynamoDBAccessValidatorTables], "" ] ]
  
Resources:

  # --------------------------
  # CDC Dynamo Alert Lambda
  # --------------------------
  InfraSecMonitoringDynamoAlertLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-infra-sec-monitoring-dynamo-alert-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${ProjectName}-infra-sec-monitoring-dynamo-alert-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref CriticalAlarmSNSTopicArn
              - Effect: Allow
                Action:
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:DescribeStreamSummary
                  - kinesis:ListShards
                  - kinesis:ListStreams
                Resource: !Ref CdcKinesisStreamArn
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !Ref CdcKinesisStreamKeyArn

  InfraSecMonitoringDynamoAlertLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-infra-sec-monitoring-dynamo-alert"
      RetentionInDays: !Ref LogRetentionDays

  InfraSecMonitoringDynamoAlertLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-infra-sec-monitoring-dynamo-alert"
      Description: "Validates CDC events against Dynamo table policies and emits violations"
      Runtime: python3.12
      Handler: infra-sec-monitoring-dynamo-alert.lambda_handler
      Role: !GetAtt InfraSecMonitoringDynamoAlertLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdasBucketName
        S3Key: !Sub ${LambdasBasePath}/infra-sec-monitoring-dynamo-alert.zip
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref CriticalAlarmSNSTopicArn
          TABLE_CONFIG: !Ref DynamoAlertLambdaTableConfig
          ENVIRONMENT: !Ref EnvironmentType
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency

  InfraSecMonitoringDynamoAlertLambdaEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 100
      Enabled: true
      EventSourceArn: !Ref CdcKinesisStreamArn
      FunctionName: !Ref InfraSecMonitoringDynamoAlertLambda
      StartingPosition: LATEST

  # --------------------------
  # CloudTrail Configuration
  # --------------------------
  InfraSecMonitoringCloudTrail:
    Condition: HasCloudTrailLogsEnabled
    Type: AWS::CloudTrail::Trail
    DependsOn:
      - CloudTrailLogsPolicy
    Properties:
      TrailName: !Sub "${ProjectName}-${InfraSecTrailName}"
      IsMultiRegionTrail: !If [IsMultiRegionTrailCondition, true, false]
      CloudWatchLogsLogGroupArn: !GetAtt CloudTrailLogGroup.Arn
      CloudWatchLogsRoleArn: !GetAtt CloudTrailLogsRole.Arn
      IsOrganizationTrail: false
      EnableLogFileValidation: true
      AdvancedEventSelectors:
        - !If
          - HasS3CriticalPrefixMonitoring
          - 
            Name: "S3 Critical Prefix Operations"
            FieldSelectors:
              - Field: eventCategory
                Equals: ["Data"]
              - Field: resources.type
                Equals: ["AWS::S3::Object"]
              - Field: resources.ARN
                StartsWith: !Ref CriticalS3Prefixes
          - !Ref "AWS::NoValue"
        - !If 
          - HasDynamoDBCriticalTableMonitoring
          -
            Name: "DynamoDB Table Operations on Critical Tables"
            FieldSelectors:
              - Field: eventCategory
                Equals: ["Data"]
              - Field: resources.type
                Equals: ["AWS::DynamoDB::Table"]  
              - Field: resources.ARN 
                StartsWith: !Ref CriticalDynamoDBTables
          - !Ref "AWS::NoValue"
        - Name: "Management Events"
          FieldSelectors:
            - Field: eventCategory
              Equals: ["Management"]
      S3BucketName: !Ref LogsBucketName
      S3KeyPrefix: "pn-infra-sec-monitoring"
      IsLogging: true

  CloudTrailLogsRole:
    Condition: HasCloudTrailLogsEnabled
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${InfraSecTrailName}-CloudTrailLogsRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sts:AssumeRole

  CloudTrailLogGroup:
    Condition: HasCloudTrailLogsEnabled
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/cloudtrail/${ProjectName}-${InfraSecTrailName}"
      RetentionInDays: !Ref LogRetentionDays

  CloudTrailLogsPolicy:
    Condition: HasCloudTrailLogsEnabled
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${ProjectName}-CloudTrailLogsPolicy"
      Roles:
        - !Ref CloudTrailLogsRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
            Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/cloudtrail/${ProjectName}-${InfraSecTrailName}:*"
          - Effect: Allow
            Action:
              - kinesis:GetRecords
              - kinesis:GetShardIterator
              - kinesis:DescribeStream
              - kinesis:ListShards
            Resource: !Ref CdcKinesisStreamArn

  # --------------------------
  # EventBridge Rules
  # --------------------------

  DynamoDBTableDeletionRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ProjectName}-dynamodb-deletion-alert"
      EventPattern:
        source: ["aws.dynamodb"]
        detail-type: ["AWS API Call via CloudTrail"]
        detail:
          eventSource: ["dynamodb.amazonaws.com"]
          eventName: ["DeleteTable"]
      Targets:
        - Id: SendToSNS
          Arn: !Ref CriticalAlarmSNSTopicArn
          InputTransformer:
            InputPathsMap:
              time: $.time
              user: $.detail.userIdentity.principalId
              sourceIP: $.detail.sourceIPAddress
              tableName: $.detail.requestParameters.tableName
            InputTemplate: !Sub |
              "CRITICAL ALERT: DynamoDB Table Deletion - Environment: ${EnvironmentType} - Table: <tableName> - User: <user> - IP: <sourceIP> - Time: <time>"

  DynamoDBPITRDisabledRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ProjectName}-pitr-disabled"
      EventPattern:
        source: ["aws.dynamodb"]
        detail-type: ["AWS API Call via CloudTrail"]
        detail:
          eventName: ["UpdateContinuousBackups"]
          requestParameters:
            tableName:
              anything-but: !Ref PITRExcludedTables
            pointInTimeRecoverySpecification:
              pointInTimeRecoveryEnabled: [false]
      Targets:
        - Id: SendToSNS
          Arn: !Ref CriticalAlarmSNSTopicArn
          InputTransformer:
            InputPathsMap:
              time: $.time
              user: $.detail.userIdentity.principalId
              tableName: $.detail.requestParameters.tableName
            InputTemplate: !Sub |
              "CRITICAL: PITR Disabled - Environment: ${EnvironmentType} - Table: <tableName> - User: <user> - Time: <time>"

  DynamoDBDeletionProtectionRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ProjectName}-deletion-protection-disabled"
      EventPattern:
        source: ["aws.dynamodb"]
        detail-type: ["AWS API Call via CloudTrail"]
        detail:
          eventName: ["UpdateTable"]
          requestParameters:
            deletionProtectionEnabled: [false]
      Targets:
        - Id: SendToSNS
          Arn: !Ref CriticalAlarmSNSTopicArn
          InputTransformer:
            InputPathsMap:
              time: $.time
              user: $.detail.userIdentity.principalId
              tableName: $.detail.requestParameters.tableName
              sourceIP: $.detail.sourceIPAddress
            InputTemplate: !Sub |
              "CRITICAL: Deletion Protection Disabled - Environment: ${EnvironmentType} - Table: <tableName> - User: <user> - IP: <sourceIP> - Time: <time>"


  S3BucketDeletionRule:
    Condition: MonitorS3Condition
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ProjectName}-s3-deletion-alert"
      EventPattern:
        source: ["aws.s3"]
        detail-type: ["AWS API Call via CloudTrail"]
        detail:
          eventSource: ["s3.amazonaws.com"]
          eventName: ["DeleteBucket"]
          requestParameters:
            bucketName: [!Sub "pn-safestorage-${AWS::Region}-${AWS::AccountId}"]
      Targets:
        - Id: SendToSNS
          Arn: !Ref CriticalAlarmSNSTopicArn
          InputTransformer:
            InputPathsMap:
              time: $.time
              user: $.detail.userIdentity.principalId
              bucketName: $.detail.requestParameters.bucketName
            InputTemplate: !Sub |
              "CRITICAL: S3 Bucket Deletion - Environment: ${EnvironmentType} - Bucket: <bucketName> - User: <user> - Time: <time>"

  pnConfidentialObjectsCriticalMonitoring:
    Condition: HasCloudTrailLogsEnabledAndIsConfinfoAccount
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/s3tables-monitoring.yaml"
      Parameters:
        DynamoDBTableName: pn-ConfidentialObjects
        CloudTrailLogGroupName: !Ref CloudTrailLogGroup
        EnableUnauthorizedRoleAttempts: false

  pnTimelineCriticalMonitoring:
    Condition: HasCloudTrailLogsEnabledAndIsCoreAccount
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/s3tables-monitoring.yaml"
      Parameters:
        DynamoDBTableName: pn-Timelines
        CloudTrailLogGroupName: !Ref CloudTrailLogGroup
        EnableUnauthorizedRoleAttempts: false

  # ============================================================================
  # EventBridge rules for S3 access monitoring (presigned URL usage and access denied events)
  # ============================================================================

  # ============================================================================
  # Rule: S3 GetObject (presigned URL file download)
  # ============================================================================
  S3GetObjectRule:
    Condition: HasCloudtrailEventDataStoreEnabledAndIsConfinfoAccount
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentType}-s3-url-getobject"
      Description: "Capture S3 GetObject events for URL access monitoring"
      EventPattern:
        source:
          - "aws.s3"
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "s3.amazonaws.com"
          eventName:
            - "GetObject"
          requestParameters:
            bucketName:
              - !Sub "pn-safestorage-${AWS::Region}-${AWS::AccountId}"
      Targets:
        - Arn: !GetAtt InfraSecMonitoringUrlAccessAnalyzerAlertLambda.Arn
          Id: "SendToLambda"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentType

  S3GetObjectPermission:
    Condition: HasCloudtrailEventDataStoreEnabledAndIsConfinfoAccount
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InfraSecMonitoringUrlAccessAnalyzerAlertLambda
      Action: "lambda:InvokeFunction"
      Principal: "events.amazonaws.com"
      SourceArn: !GetAtt S3GetObjectRule.Arn

  # ============================================================================
  # Rule: AccessDenied events for S3
  # ============================================================================
  S3AccessDeniedRule:
    Condition: HasCloudtrailEventDataStoreEnabledAndIsConfinfoAccount
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentType}-s3-url-access-denied"
      Description: "Capture S3 AccessDenied events for security monitoring"
      EventPattern:
        source:
          - "aws.s3"
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "s3.amazonaws.com"
          errorCode:
            - "AccessDenied"
          requestParameters:
            bucketName:
              - !Sub "pn-safestorage-${AWS::Region}-${AWS::AccountId}"
            key:
              - anything-but: "favicon.ico"
      Targets:
        - Arn: !GetAtt InfraSecMonitoringUrlAccessAnalyzerAlertLambda.Arn
          Id: "SendToLambda"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentType

  S3AccessDeniedPermission:
    Condition: HasCloudtrailEventDataStoreEnabledAndIsConfinfoAccount
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InfraSecMonitoringUrlAccessAnalyzerAlertLambda
      Action: "lambda:InvokeFunction"
      Principal: "events.amazonaws.com"
      SourceArn: !GetAtt S3AccessDeniedRule.Arn

  InfraSecMonitoringUrlAccessAnalyzerAlertLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-infra-sec-url-access-analyzer-alert"
      RetentionInDays: !Ref LogRetentionDays
      
  InfraSecMonitoringUrlAccessAnalyzerAlertLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-infra-sec-url-access-analyzer-alert"
      Description: "Analyzes S3 access events to detect potential unauthorized access patterns (e.g., presigned URL abuse, access denied events)"
      Runtime: python3.12
      Handler: infra-sec-url-access-analyzer-alert.lambda_handler
      Role: !GetAtt InfraSecMonitoringUrlAccessAnalyzerAlertLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdasBucketName
        S3Key: !Sub ${LambdasBasePath}/infra-sec-url-access-analyzer-alert.zip
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref CriticalAlarmSNSTopicArn
          TABLE_CONFIG: !Ref DynamoAlertLambdaTableConfig
          ENVIRONMENT: !Ref EnvironmentType
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency

  InfraSecMonitoringUrlAccessAnalyzerAlertLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-infra-sec-url-access-analyzer-alert-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${ProjectName}-infra-sec-url-access-analyzer-alert-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref CriticalAlarmSNSTopicArn

  # ============================================================================
  # EventBridge rules for access validator 
  # ============================================================================

  #===========================================================================
  # Rule: Monitor access patterns to critical DynamoDB tables (requires CloudTrail Event Data Store)
  #===========================================================================
  DynamoDbAccessMonitorRule:
    Type: AWS::Events::Rule
    Condition: HasDynamoDBAccessValidatorTables
    Properties:
      Name: !Sub "${EnvironmentType}-dynamodb-access-monitor"
      Description: "Monitor all DynamoDB access to Critical DynamoDB tables (CloudTrail filters to data events only)"
      EventPattern:
        source:
          - aws.dynamodb
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - dynamodb.amazonaws.com
          eventName:
            - GetItem
            - PutItem
            - UpdateItem
            - DeleteItem
            - BatchGetItem
            - BatchWriteItem
            - Query
            - Scan
          requestParameters:
            tableName: !Ref DynamoDBAccessValidatorTables
      Targets:
        - Id: SecurityEventQueue
          Arn: !GetAtt SecurityEventsQueue.Outputs.QueueARN

  #===========================================================================
  # Rule: Monitor access patterns to critical S3 prefixes (requires CloudTrail Event Data Store)
  #===========================================================================
  S3AccessMonitorRule:
    Type: AWS::Events::Rule
    Condition: HasCloudtrailEventDataStoreEnabledAndIsConfinfoAccount
    Properties:
      Name: !Sub "${EnvironmentType}-s3-access-monitor"
      Description: "Monitor S3 access to safestorage bucket (CloudTrail filters to critical prefix only)"
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - s3.amazonaws.com
          eventName:
            - GetObject
            - PutObject
            - DeleteObject
            - DeleteObjects
            - CopyObject
            - RestoreObject
          requestParameters:
            bucketName:
              - !Sub "pn-safestorage-${AWS::Region}-${AWS::AccountId}"
      Targets:
        - Id: SecurityEventQueue
          Arn: !GetAtt SecurityEventsQueue.Outputs.QueueARN

  SecurityEventsQueue:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/sqs-queue.yaml"
      Parameters:
        QueueName: !Sub "${ProjectName}-security-events-queue"
        AlarmSNSTopicName: !Ref AlarmSNSTopicName
        HasDLQ: "true"
        QueueHasAlarm: "true"

  SecurityEventsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !GetAtt SecurityEventsQueue.Outputs.QueueURL
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgeToSendMessage
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt SecurityEventsQueue.Outputs.QueueARN
            Condition:
              ArnEquals:
                aws:SourceArn:
                  - !GetAtt DynamoDbAccessMonitorRule.Arn
                  - !GetAtt S3AccessMonitorRule.Arn
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - Sid: AllowLambdaToReceiveMessages
            Effect: Allow
            Principal:
              AWS: !GetAtt AccessValidatorRole.Arn
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt SecurityEventsQueue.Outputs.QueueARN
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId


  # ============================================================================
  # IAM Role for Lambda
  # ============================================================================
  AccessValidatorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-infra-sec-access-validator-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${ProjectName}-infra-sec-access-validator-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref CriticalAlarmSNSTopicArn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SecurityEventsQueue.Outputs.QueueARN
              - Effect: Allow
                Action: s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::pn-datamonitoring-${AWS::Region}-${AWS::AccountId}/infra-sec-access-validator/authorized_roles.csv"

  # ============================================================================
  # Lambda Function
  # ============================================================================
  AccessValidatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-infra-sec-access-validator-alert"
      RetentionInDays: 14

  AccessValidatorFunction:
    Type: AWS::Lambda::Function
    DependsOn: AccessValidatorLogGroup
    Properties:
      FunctionName: !Sub "${ProjectName}-infra-sec-access-validator-alert"
      Handler: infra-sec-access-validator-alert.lambda_handler
      Role: !GetAtt AccessValidatorRole.Arn
      Code:
        S3Bucket: !Ref LambdasBucketName
        S3Key: !Sub ${LambdasBasePath}/infra-sec-access-validator-alert.zip
      Runtime: python3.11
      Timeout: 20
      MemorySize: 256
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref CriticalAlarmSNSTopicArn
          DYNAMODB_TABLE_NAMES: !Join [",", !Ref DynamoDBAccessValidatorTables]
          S3_BUCKET_NAME: !Sub "pn-safestorage-${AWS::Region}-${AWS::AccountId}"
          AUTHORIZED_ROLES_CSV: "" 
          CSV_HASH: !Ref ExpectedCsvHash
          CSV_S3_BUCKET: !Sub "pn-datamonitoring-${AWS::Region}-${AWS::AccountId}"
          CSV_S3_KEY: "infra-sec-access-validator/authorized_roles.csv"
          ENVIRONMENT: !Ref EnvironmentType
          ALERT_ON_CROSS_ACCOUNT: !Ref AlertOnCrossAccountAccess
          ALLOWED_ACCOUNT_IDS: !Join [",", !Ref AllowedAccountIds]

  SecurityEventsEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt SecurityEventsQueue.Outputs.QueueARN
      FunctionName: !Ref AccessValidatorFunction
      BatchSize: 10
      MaximumBatchingWindowInSeconds: 5
      ScalingConfig:
        MaximumConcurrency: !Ref LambdaReservedConcurrency
      FunctionResponseTypes:
        - ReportBatchItemFailures

Outputs:
  Version:
    Value: !Ref Version
    Description: 'Template version'